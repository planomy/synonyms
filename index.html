<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#0f1419" />
  <title>Synonyms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0b0d10;
      --bg-panel: #11151a;
      --bg-tile: #171c24;
      --bg-tile-hover: #1f2630;
      --letter-ink: #8b99ab;
      --stroke: rgba(255, 255, 255, 0.06);
      --stroke-strong: rgba(255, 255, 255, 0.1);
      --text: #e8eef5;
      --text-muted: #7a8a9e;
      --accent: #5ee4d4;
      --accent-dim: rgba(94, 228, 212, 0.15);
      --accent-glow: rgba(94, 228, 212, 0.45);
      --gold: #f4d06f;
      --gold-dim: rgba(244, 208, 111, 0.12);
      --success: #7ddf8e;
      --success-bg: rgba(125, 223, 142, 0.12);
      --danger: #ff8b7a;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
      --font-display: "Fraunces", Georgia, serif;
      --font-ui: "Outfit", system-ui, sans-serif;
      /* Header / HUD column — wide enough for badges + 5-digit Total inline */
      --header-max: min(26.5rem, calc((100vw - 24px) * 0.94));
      /* HUD achievement badges — one rim treatment */
      --ach-badge-rim-outer: rgba(67, 56, 130, 0.94);
      --ach-badge-rim-outer-strong: rgba(99, 102, 241, 0.82);
      --ach-badge-rim-glow: rgba(129, 140, 248, 0.12);
      --ach-badge-count-rim: rgba(99, 102, 241, 0.42);
      /* Match letter tiles to slot cells so one row of letters never needs a narrower tray */
      --rack-tile: clamp(28px, 3.8vw, 36px);
      --row-gap-compact: clamp(8px, 1.4vh, 14px);
      /* Half of prior tile radii — shared by rack letters + slots */
      --rack-corner: clamp(4px, 0.5vh, 5px);
      --slot-flat: #dce2ea;
      --slot-flat-filled: #d4dce8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      height: -webkit-fill-available;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    body {
      min-height: 100%;
      min-height: -webkit-fill-available;
      /* Slight overflow so the document can scroll: mobile browsers hide chrome when the page scrolls. */
      min-height: calc(100dvh + 2px);
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-family: var(--font-ui);
      background: var(--bg-deep);
      color: var(--text);
      background-image:
        radial-gradient(ellipse 100% 70% at 50% -20%, rgba(255, 255, 255, 0.04), transparent),
        radial-gradient(ellipse 70% 50% at 100% 0%, rgba(94, 228, 212, 0.03), transparent);
    }

    .app {
      min-height: 100svh;
      min-height: 100dvh;
      width: 100%;
      max-width: min(992px, 100%);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: max(6px, env(safe-area-inset-top)) clamp(10px, 2vw, 20px) max(6px, env(safe-area-inset-bottom));
      overflow-x: hidden;
      overflow-y: visible;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 4px;
      flex-shrink: 0;
      margin-bottom: 6px;
      width: 100%;
      max-width: var(--header-max);
      margin-left: auto;
      margin-right: auto;
    }

    .logo {
      font-family: var(--font-display);
      font-size: clamp(1.35rem, 3.2vh, 1.85rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.1;
      margin: 0;
    }

    .tagline {
      font-size: clamp(0.68rem, 1.5vh, 0.78rem);
      color: var(--text-muted);
      font-weight: 500;
      text-align: center;
      line-height: 1.35;
      max-width: 36em;
      margin: 0;
    }

    .level-indicator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 6px;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: clamp(0.65rem, 1.45vh, 0.74rem);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(94, 228, 212, 0.28);
      box-shadow: 0 0 20px rgba(94, 228, 212, 0.08);
    }

    .daily-progress {
      margin-top: 0;
      font-size: clamp(0.68rem, 1.5vh, 0.8rem);
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /** Level pill + set — full width above HUD; pill centred, set right-aligned with panel edge */
    .hud-status-meta {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      width: 100%;
      max-width: var(--header-max);
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 6px;
      padding: 0 14px;
      box-sizing: border-box;
    }

    .hud-status-meta .hud-status-spacer {
      grid-column: 1;
    }

    .hud-status-meta .level-indicator {
      grid-column: 2;
      justify-self: center;
      margin-top: 0;
    }

    .hud-status-meta .daily-progress {
      grid-column: 3;
      justify-self: end;
      text-align: right;
    }

    .achievement-badges {
      display: inline-flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      width: auto;
      margin: 0;
      padding: 0;
      border: 0;
      flex-shrink: 0;
    }

    .ach-badge-icon-only {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
      border: none;
      /* Dark backing: square PNGs often have light pixels at the edges; circles made white “wings”. */
      background: var(--bg-deep);
      cursor: pointer;
      touch-action: manipulation;
      border-radius: clamp(10px, 26%, 13px);
      overflow: hidden;
      line-height: 0;
      -webkit-tap-highlight-color: transparent;
      font: inherit;
      color: inherit;
    }

    .ach-badge-icon-only.ach-blitz,
    .ach-badge-icon-only.ach-pure,
    .ach-badge-icon-only.ach-streak {
      box-shadow:
        inset 0 0 0 0.5px rgba(0, 0, 0, 0.72),
        0 0 0 0.5px var(--ach-badge-rim-outer);
    }

    .ach-badge-icon-only:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
    }

    /*
      PNGs are not identical artboards: different baked-in teal rings, padding, and icon scale.
      We crop/zoom each asset so the HUD reads one system (indigo rim + dark fill); tune vars if assets change.
    */
    .ach-badge-icon {
      --ach-badge-edge-crop: 1.14;
      --ach-badge-origin-x: 50%;
      --ach-badge-origin-y: 50%;
      width: clamp(36px, 4.4vh, 44px);
      height: clamp(36px, 4.4vh, 44px);
      border-radius: clamp(10px, 26%, 13px);
      object-fit: contain;
      flex-shrink: 0;
      border: none;
      background: var(--bg-deep);
      box-shadow: none;
      display: block;
      transform-origin: var(--ach-badge-origin-x) var(--ach-badge-origin-y);
      transform: scale(var(--ach-badge-edge-crop));
    }

    /* Blitz PNG ships a bright outer rim — crop hard so that rim clips away; HUD rim is CSS indigo only. */
    .ach-badge-icon-only.ach-blitz .ach-badge-icon {
      --ach-badge-edge-crop: 1.26;
    }

    /* Pure: thick baked halo in file → tight crop. */
    .ach-badge-icon-only.ach-pure .ach-badge-icon {
      --ach-badge-edge-crop: 1.28;
    }

    /* Streak: crop to similar depth as Blitz/Pure so inner glow isn’t the dominant “border”. */
    .ach-badge-icon-only.ach-streak .ach-badge-icon {
      --ach-badge-edge-crop: 1.24;
      --ach-badge-origin-y: 56%;
    }

    .ach-badge-count {
      position: absolute;
      top: -3px;
      right: -3px;
      min-width: 1.2rem;
      height: 1.2rem;
      padding: 0 5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-size: 0.62rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      background: #12161d;
      border: none;
      color: var(--text);
      z-index: 2;
      box-shadow:
        inset 0 0 0 0.5px var(--ach-badge-count-rim),
        0 2px 8px rgba(0, 0, 0, 0.55);
      pointer-events: none;
    }

    .hud-badges-inline {
      text-align: right;
      flex: 0 0 auto;
    }

    .hud-block-total {
      margin-left: auto;
      flex: 0 0 auto;
      min-width: 8.5ch;
      text-align: right;
      padding-left: 6px;
    }

    .hud-block-total .hud-value {
      font-size: clamp(1.12rem, 3vh, 1.58rem);
      letter-spacing: -0.02em;
    }

    .hud-hint-pill-inline {
      position: relative;
      align-self: flex-end;
    }

    .ach-badge-icon-only.ach-blitz.has-count,
    .ach-badge-icon-only.ach-pure.has-count,
    .ach-badge-icon-only.ach-streak.has-count {
      box-shadow:
        inset 0 0 0 0.5px rgba(0, 0, 0, 0.72),
        0 0 0 0.5px var(--ach-badge-rim-outer-strong),
        0 0 12px var(--ach-badge-rim-glow);
    }

    .ach-badge-icon-only.badge-earned-pop .ach-badge-icon {
      animation: badgeEarnedPop 760ms cubic-bezier(0.2, 0.86, 0.18, 1);
    }

    @keyframes badgeEarnedPop {
      0% {
        transform: scale(var(--ach-badge-edge-crop));
      }
      24% {
        transform: scale(calc(var(--ach-badge-edge-crop) * 1.14));
      }
      60% {
        transform: scale(calc(var(--ach-badge-edge-crop) * 1.04));
      }
      100% {
        transform: scale(var(--ach-badge-edge-crop));
      }
    }

    #badgeInfoOverlay {
      z-index: 115;
    }

    .modal-badge-info {
      position: relative;
      padding-top: 36px;
    }

    .modal-badge-info .modal-close-badge {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-muted);
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-badge-info .modal-close-badge:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .modal-badge-info .badge-info-art {
      width: 112px;
      height: 112px;
      border-radius: 22px;
      object-fit: contain;
      background: var(--bg-deep);
      margin: 0 auto 14px;
      display: block;
      border: none;
      box-shadow:
        inset 0 0 0 0.5px rgba(0, 0, 0, 0.72),
        0 0 0 0.5px var(--ach-badge-rim-outer),
        0 16px 48px rgba(0, 0, 0, 0.45);
    }

    .modal-badge-info .badge-info-count {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--accent);
      margin-bottom: 10px !important;
    }

    .daily-complete {
      padding: 2rem 1.25rem;
      text-align: center;
      max-width: 22rem;
      margin: 0 auto;
      line-height: 1.5;
    }

    .daily-complete h3 {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .daily-complete p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .replay-btn {
      margin-top: 1rem;
      font-family: var(--font-ui);
      font-size: clamp(0.88rem, 3vw, 0.98rem);
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      width: 100%;
      max-width: 18rem;
      background: linear-gradient(135deg, var(--accent), #3bc4b3);
      color: #061016;
      box-shadow: 0 8px 28px rgba(94, 228, 212, 0.28);
      touch-action: manipulation;
    }

    .replay-btn:active {
      transform: scale(0.98);
    }

    .hud {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      align-items: flex-end;
      gap: 6px 10px;
      width: 100%;
      max-width: var(--header-max);
      margin-left: auto;
      margin-right: auto;
      padding: 6px 10px;
      background: var(--bg-panel);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .hud-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hud-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      font-weight: 600;
    }

    .hud-value {
      font-size: clamp(1.05rem, 2.8vh, 1.35rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
    }

    .hud-value.moves {
      color: var(--gold);
    }

    .hud-block-moves {
      flex: 0 0 auto;
      min-width: 0;
      align-self: flex-end;
    }

    .hud-moves-hint-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      width: auto;
      min-width: 0;
    }

    .hud-moves-hint-row .hud-hint-btn {
      margin-left: auto;
    }

    .hud-hint-btn {
      font-family: var(--font-ui);
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(244, 208, 111, 0.45);
      background: rgba(244, 208, 111, 0.12);
      color: var(--gold);
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
      flex-shrink: 0;
    }

    .hud-hint-btn-inner {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .hud-hint-btn-count {
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      letter-spacing: 0.02em;
      opacity: 0.92;
      min-width: 1ch;
    }

    .hud-hint-btn:hover:not(:disabled) {
      background: rgba(244, 208, 111, 0.22);
    }

    .hud-hint-btn:disabled {
      opacity: 0.38;
      cursor: not-allowed;
    }

    /* Floats below the Hint pill so the HUD row height never jumps. */
    .hud-hint-msg {
      position: absolute;
      left: 50%;
      top: calc(100% + 4px);
      transform: translateX(-50%);
      margin: 0;
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 0.62rem;
      font-weight: 600;
      line-height: 1.2;
      color: var(--danger);
      text-align: center;
      white-space: nowrap;
      background: var(--bg-panel);
      border: 1px solid var(--stroke-strong);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.45);
      z-index: 50;
      pointer-events: none;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.12s ease, visibility 0.12s ease;
    }

    .hud-hint-msg.is-visible {
      visibility: visible;
      opacity: 1;
    }

    .board {
      width: 100%;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--row-gap-compact);
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding-bottom: 2px;
    }

    .row-wrap {
      position: relative;
      background: linear-gradient(180deg, #141a22 0%, #0f1318 100%);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: clamp(5px, 0.7vh, 8px);
      padding: clamp(6px, 1.1vh, 10px) clamp(10px, 1.4vw, 14px);
      flex: 0 1 auto;
      min-height: 0;
      width: fit-content;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition:
        background 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease;
    }

    .row-wrap.row-active:not(.solved),
    .row-wrap:focus-within:not(.solved) {
      background: linear-gradient(180deg, #1a2532 0%, #121a24 100%);
      border: 2px solid rgba(94, 228, 212, 0.42);
      box-shadow:
        0 0 0 1px rgba(94, 228, 212, 0.15),
        0 6px 28px rgba(94, 228, 212, 0.12);
    }

    .slot.slot-from-hint.filled {
      background: var(--slot-flat-filled);
      box-shadow: 0 0 0 1px rgba(244, 208, 111, 0.55);
    }

    .row-wrap:focus {
      outline: none;
    }

    .row-wrap:focus-visible {
      box-shadow: 0 0 0 2px rgba(94, 228, 212, 0.45), 0 0 24px rgba(94, 228, 212, 0.12);
      border-color: rgba(94, 228, 212, 0.35);
    }

    .row-wrap.row-wrong:not(.solved) {
      border-color: rgba(220, 90, 90, 0.55);
      box-shadow: 0 0 0 1px rgba(200, 60, 60, 0.35);
    }

    .row-wrap.row-wrong.row-active:not(.solved),
    .row-wrap.row-wrong:focus-within:not(.solved) {
      background: linear-gradient(180deg, #281a1c 0%, #1a1214 100%);
      border: 2px solid rgba(220, 90, 90, 0.55);
      box-shadow:
        0 0 0 1px rgba(200, 50, 50, 0.25),
        0 6px 28px rgba(140, 40, 40, 0.18);
    }

    .row-wrap.row-wrong .slot.slot-active.filled {
      background: #b83838;
      color: #fff;
      border-color: rgba(0, 0, 0, 0.15);
      box-shadow: 0 0 0 1px rgba(160, 45, 45, 0.55);
    }

    .row-wrap.row-wrong .slot.slot-from-hint.filled {
      box-shadow: 0 0 0 1px rgba(244, 208, 111, 0.55);
    }

    /** Per-word solve flair: drifts in from the right, floats up, fades (cosmetic; round score is tallied at end). */
    .row-points-float {
      position: absolute;
      right: clamp(6px, 1.4vw, 14px);
      top: 50%;
      margin-top: -0.55em;
      font-family: var(--font-ui);
      font-size: clamp(0.82rem, 2.1vw, 1.02rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      color: var(--success);
      text-shadow:
        0 0 14px rgba(125, 223, 142, 0.65),
        0 1px 2px rgba(0, 0, 0, 0.45);
      white-space: nowrap;
      pointer-events: none;
      z-index: 25;
      line-height: 1;
      animation: rowPointsFloat 0.95s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .row-points-float .row-points-sub {
      display: block;
      margin-top: 2px;
      font-size: 0.58em;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(125, 223, 142, 0.92);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
    }

    @keyframes rowPointsFloat {
      0% {
        opacity: 0;
        transform: translate3d(18px, 0, 0) scale(0.88);
      }
      14% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1.06);
      }
      70% {
        opacity: 1;
        transform: translate3d(0, -28px, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate3d(0, -40px, 0) scale(0.98);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .row-points-float {
        animation: rowPointsFloatReduced 0.45s ease-out forwards;
      }

      @keyframes rowPointsFloatReduced {
        0% {
          opacity: 0;
        }
        35% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
    }

    .row-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(6px, 1vh, 10px);
      width: auto;
      max-width: 100%;
      min-height: 0;
      margin-left: auto;
      margin-right: auto;
      box-sizing: border-box;
    }

    .letter-tray {
      order: -1;
      display: flex;
      flex-wrap: nowrap;
      gap: clamp(4px, 0.85vw, 7px);
      justify-content: center;
      align-items: center;
      position: relative;
      width: 100%;
      flex: 0 0 auto;
      min-width: 0;
      margin: 0 auto;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
    }

    .letter {
      flex: 0 0 auto;
      width: var(--rack-tile);
      min-width: var(--rack-tile);
      height: var(--rack-tile);
      min-height: var(--rack-tile);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.8rem, 2vw, 0.98rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--letter-ink);
      background: var(--bg-tile);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: var(--rack-corner);
      box-shadow: none;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease, box-shadow 0.2s ease, color 0.15s ease;
      touch-action: manipulation;
    }

    .letter:hover {
      background: var(--bg-tile-hover);
      border-color: rgba(255, 255, 255, 0.26);
      color: #aab8ca;
      transform: translateY(-1px);
    }

    .letter:active {
      transform: scale(0.97);
      box-shadow: none;
    }

    .letter.selected {
      border-color: rgba(94, 228, 212, 0.55);
      color: var(--text);
      background: #252d38;
      box-shadow:
        0 0 0 1px rgba(94, 228, 212, 0.35),
        0 0 18px rgba(94, 228, 212, 0.22);
      transform: translateY(-2px);
      z-index: 1;
    }

    .letter.used {
      visibility: hidden;
      pointer-events: none;
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    .slots {
      display: flex;
      flex-wrap: nowrap;
      gap: clamp(4px, 0.85vw, 7px);
      justify-content: center;
      align-items: center;
      align-self: center;
      width: max-content;
      flex: 0 0 auto;
      min-width: 0;
      max-width: 100%;
      margin-left: auto;
      margin-right: auto;
    }

    .row-wrap.solved .slots {
      gap: 0;
      border-radius: clamp(4px, 0.55vh, 7px);
      overflow: hidden;
    }

    .slot {
      flex: 0 0 auto;
      width: var(--rack-tile);
      min-width: var(--rack-tile);
      height: var(--rack-tile);
      min-height: var(--rack-tile);
      border-radius: var(--rack-corner);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.8rem, 2vw, 0.98rem);
      font-weight: 700;
      cursor: pointer;
      transition: box-shadow 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease, background 0.15s ease;
      touch-action: manipulation;
      padding: 0;
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: var(--slot-flat);
      box-shadow: none;
      color: #1a2230;
    }

    .slot.slot-active.empty {
      color: transparent;
    }

    .slot.slot-active.empty:hover,
    .slot.slot-active.empty:focus-visible {
      border-color: rgba(94, 228, 212, 0.55);
      box-shadow: 0 0 0 2px rgba(94, 228, 212, 0.35);
    }

    .slot.slot-active.filled {
      border-color: rgba(0, 0, 0, 0.15);
      color: #1a2230;
      background: var(--slot-flat-filled);
      box-shadow: 0 0 0 1px rgba(94, 228, 212, 0.35);
    }

    .slot.slot-active:active {
      transform: scale(0.97);
    }

    .slot.slot-active:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .row-wrap.solved .slot.slot-active.filled {
      border: none;
      border-radius: 0;
      color: #fff;
      background: #2f8f4a;
      animation: letterReveal 0.4s ease;
    }

    .row-wrap.solved .slots .slot.slot-active.filled:not(:last-child) {
      box-shadow: inset -1px 0 0 rgba(0, 0, 0, 0.22);
    }

    .row-wrap.solved .slots .slot.slot-active.filled:last-child {
      box-shadow: none;
    }

    .row-wrap.solved .slot.slot-active.filled:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.75);
      outline-offset: 2px;
    }

    @keyframes letterReveal {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #setCompleteOverlay {
      z-index: 110;
    }

    /** Short-lived toasts above the win modal (z-index over .overlay). */
    .round-earn-toast {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 50%;
      z-index: 105;
      transform: translate3d(-50%, -120%, 0);
      padding: 10px 18px;
      border-radius: 999px;
      font-family: var(--font-ui);
      font-size: clamp(0.78rem, 2vw, 0.92rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0;
      transition:
        opacity 0.28s ease,
        transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .round-earn-toast--fast {
      color: #0c1220;
      background: linear-gradient(135deg, var(--gold) 0%, #f0c34d 100%);
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow:
        0 0 24px rgba(244, 208, 111, 0.35),
        0 12px 40px rgba(0, 0, 0, 0.45);
    }

    .round-earn-toast--clean {
      color: #061016;
      background: linear-gradient(135deg, rgba(94, 228, 212, 0.95) 0%, #3bc4b3 100%);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        0 0 22px rgba(94, 228, 212, 0.35),
        0 12px 40px rgba(0, 0, 0, 0.45);
    }

    .round-earn-toast--combo {
      color: #0c1220;
      background: linear-gradient(135deg, var(--gold) 0%, #5ee4d4 55%, #3bc4b3 100%);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow:
        0 0 28px rgba(94, 228, 212, 0.25),
        0 12px 40px rgba(0, 0, 0, 0.45);

    .round-earn-toast.is-on {
      opacity: 1;
      transform: translate3d(-50%, 0, 0);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(6, 9, 12, 0.82);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--bg-panel);
      border: 1px solid var(--stroke-strong);
      border-radius: calc(var(--radius) + 4px);
      padding: 28px 26px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow);
      transform: scale(0.92) translateY(16px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal h2 {
      font-family: var(--font-display);
      font-size: 1.65rem;
      margin-bottom: 8px;
      color: var(--gold);
    }

    .modal .score-big {
      font-size: 3rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(180deg, var(--accent), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.2;
      margin: 12px 0;
    }

    .modal p,
    .modal .win-message-body {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .win-round-flair {
      font-family: var(--font-ui);
      font-size: 0.88rem;
      font-weight: 700;
      margin: 0 0 14px;
      padding: 10px 12px;
      border-radius: 12px;
      line-height: 1.35;
      text-align: center;
    }

    .win-round-flair--blitz {
      color: #0c1220;
      background: linear-gradient(135deg, var(--gold) 0%, #f0c34d 100%);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 20px rgba(244, 208, 111, 0.22);
    }

    .win-round-flair--clean {
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(94, 228, 212, 0.35);
    }

    .win-round-flair-sub {
      display: block;
      margin-top: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    /* Sits between title/theme and the big score so “clean level” isn’t buried under the number. */
    .win-celebration-row {
      width: 100%;
      margin: 0 0 4px;
    }

    .win-celebration-row:empty {
      display: none;
    }

    .win-badge-hero-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px 18px;
      margin-bottom: 12px;
    }

    .win-badge-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 108px;
    }

    .win-badge-hero__ring {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-deep);
      box-shadow:
        inset 0 0 0 1px rgba(0, 0, 0, 0.65),
        0 0 0 1px rgba(99, 102, 241, 0.55),
        0 16px 40px rgba(0, 0, 0, 0.35);
    }

    .win-badge-hero--speed .win-badge-hero__ring {
      box-shadow:
        inset 0 0 0 1px rgba(0, 0, 0, 0.65),
        0 0 0 1px rgba(244, 208, 111, 0.55),
        0 0 28px rgba(244, 208, 111, 0.15),
        0 16px 40px rgba(0, 0, 0, 0.35);
    }

    .win-badge-hero--clean .win-badge-hero__ring {
      box-shadow:
        inset 0 0 0 1px rgba(0, 0, 0, 0.65),
        0 0 0 1px rgba(94, 228, 212, 0.5),
        0 0 28px rgba(94, 228, 212, 0.14),
        0 16px 40px rgba(0, 0, 0, 0.35);
    }

    .win-badge-hero__img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      border-radius: 16px;
      display: block;
      animation: winBadgeHeroPop 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .win-badge-hero--clean .win-badge-hero__img {
      animation-delay: 0.08s;
    }

    @keyframes winBadgeHeroPop {
      0% {
        opacity: 0;
        transform: scale(0.35) rotate(-8deg);
        filter: blur(6px);
      }
      55% {
        opacity: 1;
        transform: scale(1.08) rotate(0deg);
        filter: blur(0);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    .win-badge-hero__label {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .win-badge-hero--clean .win-badge-hero__label {
      color: var(--accent);
    }

    .win-badge-hero__hint {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .win-badge-hero-tagline {
      margin: 4px 0 0;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .btn {
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), #3bc4b3);
      color: #061016;
      box-shadow: 0 8px 28px rgba(94, 228, 212, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      touch-action: manipulation;
      width: 100%;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(94, 228, 212, 0.45);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      opacity: 0;
      animation: confetti 1.2s ease-out forwards;
    }

    @keyframes confetti {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) rotate(720deg);
      }
    }

    /* Above win / set overlays — mist + a few orbiting “electron” motes with trails */
    .celebration-particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 102;
      overflow: hidden;
    }

    .celebration-particles.celebration-particles--lifted {
      z-index: 116;
    }

    /* Radial fog puff: tight at nucleus; position set via --cele-anchor-* from JS (modal center or visual viewport). */
    .celebration-particles::before,
    .celebration-particles::after {
      content: "";
      position: absolute;
      left: var(--cele-anchor-x, 50%);
      top: var(--cele-anchor-y, 50%);
      width: 120vmax;
      height: 120vmax;
      margin-left: -60vmax;
      margin-top: -60vmax;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      border-radius: 50%;
      transform: scale(0.05);
      transform-origin: center center;
      transition: none;
    }

    .celebration-particles.celebration-particles--active::before {
      background: radial-gradient(
        circle at 50% 50%,
        rgba(150, 252, 255, 0.55) 0%,
        rgba(100, 215, 235, 0.24) 32%,
        rgba(70, 170, 195, 0.1) 54%,
        transparent 72%
      );
      filter: blur(26px);
      animation: celeFogBurstCore 0.5s cubic-bezier(0.18, 0.9, 0.32, 1) forwards;
    }

    .celebration-particles.celebration-particles--active::after {
      background: radial-gradient(
        circle at 50% 50%,
        rgba(210, 200, 255, 0.32) 0%,
        rgba(120, 230, 220, 0.16) 40%,
        rgba(94, 228, 212, 0.06) 58%,
        transparent 74%
      );
      filter: blur(42px);
      animation: celeFogBurstHalo 0.58s cubic-bezier(0.2, 0.85, 0.38, 1) 0.035s forwards;
    }

    @keyframes celeFogBurstCore {
      0% {
        opacity: 0;
        transform: scale(0.04);
        filter: blur(14px);
      }
      24% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: scale(1.45);
        filter: blur(50px);
      }
    }

    @keyframes celeFogBurstHalo {
      0% {
        opacity: 0;
        transform: scale(0.08);
        filter: blur(22px);
      }
      30% {
        opacity: 0.88;
      }
      100% {
        opacity: 0;
        transform: scale(1.72);
        filter: blur(62px);
      }
    }

    @keyframes celeFogBurstCoreRm {
      0% {
        opacity: 0;
        transform: scale(0.12);
      }
      35% {
        opacity: 0.55;
      }
      100% {
        opacity: 0;
        transform: scale(1.05);
      }
    }

    @keyframes celeFogBurstHaloRm {
      0% {
        opacity: 0;
        transform: scale(0.15);
      }
      40% {
        opacity: 0.4;
      }
      100% {
        opacity: 0;
        transform: scale(1.12);
      }
    }

    /* Orbiting “electrons” around a nucleus (wrapper spins; body sits on radius) */
    .cele-electron {
      position: absolute;
      z-index: 1;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      pointer-events: none;
      overflow: visible;
      transform-origin: 0 0;
      will-change: transform, opacity;
      animation: celeElectronOrbit var(--orbit-dur, 3s) linear forwards;
    }

    .cele-electron__body {
      position: absolute;
      left: 0;
      top: 50%;
      width: 3px;
      height: 3px;
      margin-top: -1.5px;
      border-radius: 50%;
      transform: translateX(var(--r));
      transform-origin: center center;
      background: radial-gradient(
        circle at 35% 35%,
        rgba(255, 255, 255, 1) 0%,
        rgba(200, 255, 255, 0.55) 45%,
        currentColor 72%,
        transparent 88%
      );
      box-shadow:
        -2px 0 5px rgba(120, 240, 255, 0.45),
        -6px 0 12px rgba(120, 240, 255, 0.22),
        -12px 0 20px rgba(94, 228, 212, 0.12),
        0 0 5px currentColor,
        0 0 11px rgba(120, 240, 255, 0.38);
      filter: saturate(1.12);
    }

    .cele-electron__body::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 100%;
      width: 24px;
      height: 2px;
      margin-top: -1px;
      border-radius: 2px;
      transform-origin: 100% 50%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(94, 228, 212, 0.14) 38%,
        rgba(255, 255, 255, 0.32) 72%,
        rgba(255, 255, 255, 0.52) 100%
      );
      opacity: 0.82;
      filter: blur(0.75px);
      pointer-events: none;
    }

    @keyframes celeElectronOrbit {
      0% {
        transform: rotate(var(--phase, 0deg)) scaleY(var(--squish, 1));
        opacity: 0;
      }
      7% {
        opacity: 1;
      }
      68% {
        opacity: 0.9;
      }
      100% {
        transform: rotate(calc(var(--phase, 0deg) + var(--sweep, 720deg))) scaleY(var(--squish, 1));
        opacity: 0;
      }
    }

    #winOverlay.win-overlay--juice::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 92% 58% at 50% 18%, rgba(244, 208, 111, 0.16), transparent 58%),
        radial-gradient(ellipse 72% 52% at 50% 88%, rgba(94, 228, 212, 0.12), transparent 52%),
        radial-gradient(ellipse 55% 40% at 80% 45%, rgba(167, 139, 250, 0.08), transparent 50%);
      animation: winJuiceAmbient 3.6s ease-in-out infinite alternate;
    }

    #winOverlay.win-overlay--juice .modal {
      position: relative;
      z-index: 1;
    }

    @keyframes winJuiceAmbient {
      0% {
        opacity: 0.65;
        filter: saturate(1);
      }
      100% {
        opacity: 1;
        filter: saturate(1.15);
      }
    }

    .modal.modal--juice-burst {
      animation: modalJuiceGlow 2.6s ease-in-out infinite alternate;
    }

    @keyframes modalJuiceGlow {
      0% {
        box-shadow:
          var(--shadow),
          0 0 0 0 rgba(94, 228, 212, 0),
          0 0 0 0 rgba(244, 208, 111, 0);
      }
      100% {
        box-shadow:
          var(--shadow),
          0 0 52px rgba(94, 228, 212, 0.22),
          0 0 88px rgba(244, 208, 111, 0.12);
      }
    }

    #winOverlay.win-overlay--juice .win-badge-hero__ring {
      position: relative;
      z-index: 0;
      overflow: visible;
    }

    #winOverlay.win-overlay--juice .win-badge-hero__ring::before {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: 28px;
      z-index: -1;
      opacity: 0.88;
      filter: blur(3px);
      background: linear-gradient(
        125deg,
        rgba(244, 208, 111, 0.55),
        rgba(94, 228, 212, 0.5),
        rgba(167, 139, 250, 0.45),
        rgba(244, 208, 111, 0.55)
      );
      background-size: 320% 320%;
      animation: badgeRingAurora 2.4s linear infinite;
    }

    @keyframes badgeRingAurora {
      0% {
        background-position: 0% 40%;
      }
      100% {
        background-position: 100% 60%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .celebration-particles.celebration-particles--active::before {
        animation: celeFogBurstCoreRm 0.26s ease-out forwards !important;
      }

      .celebration-particles.celebration-particles--active::after {
        animation: celeFogBurstHaloRm 0.3s ease-out 0.02s forwards !important;
      }

      .cele-electron {
        animation-duration: 0.48s !important;
      }

      .cele-electron__body::after {
        opacity: 0.45;
        width: 14px;
      }

      #winOverlay.win-overlay--juice::before {
        animation: none;
      }

      .modal.modal--juice-burst {
        animation: none;
      }

      #winOverlay.win-overlay--juice .win-badge-hero__ring::before {
        animation: none;
      }
    }

    .modal .theme-reveal {
      font-family: var(--font-display);
      font-size: 1.35rem;
      color: var(--accent);
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .modal .theme-reveal strong {

    }

    .modal .theme-reveal .level-line {

      margin-top: 0.35em;
      font-size: 0.92em;
      opacity: 0.78;
    }

    .modal-set-celebrate {
      border-color: rgba(244, 208, 111, 0.35);
      box-shadow:
        var(--shadow),
        0 0 60px rgba(244, 208, 111, 0.12),
        inset 0 0 40px rgba(94, 228, 212, 0.06);

    @keyframes setCelebratePop {

      }

    .set-celebrate-sub {

    #setContinueBtn {
      letter-spacing: 0.12em;

    }

    .set-complete-actions {

      flex-direction: column;

    .btn-share-set {
      font-family: var(--font-ui);
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 12px 20px;
      border-radius: 999px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-muted);

    .btn-share-set:hover {

        gap: 2px;

        <span class="hud-label" style="visibility:hidden">Badges</span>

            type="button"

              src="assets/badge-blitz.png"
              alt=""
              width="44"
              height="44"
              decoding="async"
            />
          </button>
          <button
            type="button"
            class="ach-badge-icon-only ach-pure"
            id="badgePure"
            aria-haspopup="dialog"
            aria-label="Pure badge, 0 earned. Tap for details."
          >
            <span class="ach-badge-count" id="badgePureCount" aria-hidden="true">0</span>
            <img
              class="ach-badge-icon"
              id="badgePureIcon"
              src="assets/badge-pure.png"
              alt=""
              width="44"
              height="44"
              decoding="async"
            />
          </button>
          <button
            type="button"
            class="ach-badge-icon-only ach-streak"
            id="badgeStreak"
            aria-haspopup="dialog"
            aria-label="Session streak, 0 sets this session. Tap for details."

            <span class="ach-badge-count" id="badgeStreakCount" aria-hidden="true">0</span>
            <img
              class="ach-badge-icon"
              id="badgeStreakIcon"
              src="assets/badge-streak.png"
              alt=""
              width="44"
              height="44"
              decoding="async"
            />
          </button>
        </div>
      </div>
      <div class="hud-block hud-block-total">
        <span class="hud-label">Total</span>
        <span class="hud-value" id="scoreDisplay">&mdash;</span>
      </div>
    </div>

    <main class="board" id="board" aria-label="Word puzzles"></main>
  </div>

  <div class="overlay" id="winOverlay" role="dialog" aria-modal="true" aria-labelledby="winTitle">
    <div class="modal">
      <h2 id="winTitle">Round complete</h2>
      <p class="theme-reveal" id="themeReveal" hidden></p>
      <div id="winCelebrationRow" class="win-celebration-row" role="status" aria-live="polite"></div>

  </div>

  <div class="overlay" id="badgeInfoOverlay" role="dialog" aria-modal="true" aria-labelledby="badgeInfoTitle">

      <p id="badgeInfoBody"></p>

  <script>
    (function () {
      const LEVEL1_ROUNDS = JSON.parse(

      const LEVEL2_ROUNDS = JSON.parse(
        document.getElementById("synonyms-data-level2").textContent.trim() || "[]"

      const LEVEL3_ROUNDS = JSON.parse(
        document.getElementById("synonyms-data-level3").textContent.trim() || "[]"
      );
      const LEVEL4_ROUNDS = JSON.parse(
        document.getElementById("synonyms-data-level4").textContent.trim() || "[]"
      );
      const LEVEL5_ROUNDS = JSON.parse(
        document.getElementById("synonyms-data-level5").textContent.trim() || "[]"
      );

      function hashString(s) {
        let h = 5381;
        for (let i = 0; i < s.length; i++) {
          h = (h << 5) + h + s.charCodeAt(i);
          h = h | 0;
        }
        return Math.abs(h);
      }

      function shuffleSeeded(arr, seedStr) {
        let seed = hashString(seedStr) >>> 0;
        function rnd() {
          seed = (1664525 * seed + 1013904223) >>> 0;
          return seed / 4294967296;
        }
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(rnd() * (i + 1));
          const t = a[i];
          a[i] = a[j];
          a[j] = t;
        }
        return a;
      }

      const ENDLESS_STORAGE_KEY = "synonyms-endless-v4";
      /** Same for every player: deck order is shuffleSeeded(pools, this + pool fingerprint). Changing this string reshuffles everyone’s run. */
      const GLOBAL_ENDLESS_SEED = "synonyms-canonical-v1";

      /** Fast level: wall-clock from playable board until solve (inclusive at this second). */
      const LEVEL_SPEED_MAX_SECONDS = 60;
      const LEVEL_SPEED_BONUS = 55;
      /** Clean level: zero hint letters placed this puzzle. */
      const LEVEL_CLEAN_BONUS = 55;
      /** Extra when both fast and clean on the same level. */
      const LEVEL_SPEED_CLEAN_COMBO_BONUS = 45;
      /** One-time bonus when a full five-puzzle set ends with zero hints (5th puzzle only). */
      const SET_PURE_BONUS = 140;
      /**
       * Round score tuning (500 puzzles ≈ full endless run). Keeps per-round totals in the
       * hundreds while a strong full clear lands in low six figures—not millions.
       */
      const SCORE_MOVE_PEAK = 145;
      const SCORE_STREAK_PER_ROUND = 0.55;
      const SCORE_ZERO_MOVE_BASE = 28;
      /** Full sets cleared in this tab session (survives reload; cleared when tab closes). */
      const SESSION_SETS_CLEARED_KEY = "synonyms-session-sets-v1";

      function clampLifetimeScore() {
        var n = Number(lifetimeScore);
        if (!Number.isFinite(n)) n = 0;
        lifetimeScore = Math.max(0, Math.round(n));
      }

      /** Full run: sets of 5 (Level 1→5), aligned across pools. */
      /** @type {{ level: number; theme: string; words: string[] }[]} */
      let endlessDeck = [];
      let endlessSeed = "";
      let endlessPoolFingerprint = "";
      let lifetimeScore = 0;
      let blitzSetsLifetime = 0;
      let pureSetsLifetime = 0;
      let sessionSetsCleared = 0;

      let roundIndex = 0;

      function getPoolFingerprint() {
        return [LEVEL1_ROUNDS, LEVEL2_ROUNDS, LEVEL3_ROUNDS, LEVEL4_ROUNDS, LEVEL5_ROUNDS]
          .map(function (p) {
            return p.length;
          })
          .join("-");
      }

      function totalSetsFromDeck(deck) {
        return Math.floor(deck.length / 5);
      }

      /**
       * One puzzle from each level per set, every puzzle used once. Theme titles must not repeat
       * within a set (levels reuse names like “Dirty” / “Throw” across pools — same index s used to
       * line them up caused duplicate titles in one set).
       */

        const pools = [LEVEL1_ROUNDS, LEVEL2_ROUNDS, LEVEL3_ROUNDS, LEVEL4_ROUNDS, LEVEL5_ROUNDS];
        const n = Math.min.apply(
          null,
          pools.map(function (p) {
            return p.length;
          })
        );
        if (n <= 0) return [];
        for (let attempt = 0; attempt < 48; attempt++) {
          const attemptSeed = attempt ? seedStr + "|uniqAttempt=" + attempt : seedStr;
          const deck = tryBuildUniqueThemeSetsDeck(attemptSeed, pools, n);

        }
        console.warn(
          "[Synonyms] Could not assign 5 unique theme titles per set; falling back to index pairing."
        );
        return buildSetCycledDeckIndexPairing(seedStr, pools, n);
      }

      function buildSetCycledDeckIndexPairing(seedStr, pools, n) {
        const shuffledByLevel = pools.map(function (pool, idx) {
          return shuffleSeeded(pool.slice(0, n), seedStr + "-L" + (idx + 1));
        });
        const deck = [];
        for (let s = 0; s < n; s++) {
          for (let L = 0; L < 5; L++) {

        return deck;

        const shuffledByLevel = pools.map(function (pool, idx) {
          return shuffleSeeded(pool.slice(0, n), seedStr + "-L" + (idx + 1));

          const chosen = [null, null, null, null, null];
          const themesInSet = Object.create(null);
          function dfs(lvl) {
            if (lvl === 5) return true;
            const slotOrder = shuffleSeeded(
              Array.from({ length: n }, function (_, i) {
                return i;
              }),
              seedStr + "-uniqSlots-set" + setIdx + "-lvl" + lvl
            );
            for (let si = 0; si < n; si++) {
              const slot = slotOrder[si];
              if (usedSlot[lvl].has(slot)) continue;
              const t = shuffledByLevel[lvl][slot].theme;
              if (themesInSet[t]) continue;
              themesInSet[t] = true;
              usedSlot[lvl].add(slot);
              chosen[lvl] = shuffledByLevel[lvl][slot];
              if (dfs(lvl + 1)) return true;
              usedSlot[lvl].delete(slot);
              delete themesInSet[t];
              chosen[lvl] = null;
            }
            return false;
          }
          if (!dfs(0)) return null;
          for (let L = 0; L < 5; L++) deck.push(chosen[L]);
        }
        return deck;
      }

        endlessDeck = buildSetCycledDeck(GLOBAL_ENDLESS_SEED + "|fp=" + fp);
        lifetimeScore = st.totalScore;
        clampLifetimeScore();
        roundIndex = Math.min(Math.max(0, st.puzzleIndex), endlessDeck.length);
        hintsThisSet = typeof st.setHints === "number" ? st.setHints : 0;
        const loadedBlitz = typeof st.blitzSets === "number" ? st.blitzSets : 0;
        const loadedPure = typeof st.pureSets === "number" ? st.pureSets : 0;
        /* If localStorage write failed earlier, disk can lag behind in-memory tallies — never regress. */
        blitzSetsLifetime = Math.max(blitzSetsLifetime, loadedBlitz);

      function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {

          [a[i], a[j]] = [a[j], a[i]];

      /**
       * Moves vs letter-count par, mild round streak, minus flat hint penalty.
       * Tuned so a near-perfect full run (~500 puzzles) stays in low six figures.
       */
      function computeScore(words, moveCount, hintPenalty) {
        const par = minMovesPar(words);
        const streak = Math.round(roundIndex * SCORE_STREAK_PER_ROUND);
        if (moveCount <= 0) {
          return Math.max(35, SCORE_ZERO_MOVE_BASE + streak - hintPenalty);
        }
        const moveRatio = Math.min(1, par / moveCount);
        const base = Math.round(SCORE_MOVE_PEAK * moveRatio * moveRatio);
        return Math.max(35, base + streak - hintPenalty);
      }

      /** Count up the big score on the win modal only (HUD updates when finished). */
      function animateScoreOnSplash(modalEl, target, durationMs, onDone) {
        const from = Math.max(
          0,
          Math.min(target - 1, Math.floor(target * 0.1 + 50 + Math.min(180, target * 0.2)))
        );
        const t0 = performance.now();
        modalEl.textContent = String(from);
        function tick(now) {
          const u = Math.min(1, (now - t0) / durationMs);
          const eased = 1 - Math.pow(1 - u, 4);
          modalEl.textContent = String(Math.round(from + (target - from) * eased));
          if (u < 1) {
            requestAnimationFrame(tick);
          } else {
            modalEl.textContent = String(target);
            if (onDone) onDone();
          }
        }
        requestAnimationFrame(tick);
      }

      /** Explicit range roll (e.g. lifetime tally on set complete). */

        const from = Math.round(fromVal);
        const to = Math.round(toVal);
        const t0 = performance.now();
        modalEl.textContent = String(from);
        function tick(now) {
          const u = Math.min(1, (now - t0) / durationMs);
          const eased = 1 - Math.pow(1 - u, 4);
          modalEl.textContent = String(Math.round(from + (to - from) * eased));
          if (u < 1) {
            requestAnimationFrame(tick);
          } else {
            modalEl.textContent = String(to);
            if (onDone) onDone();
          }
        }
        requestAnimationFrame(tick);
      }

      /** Center of the “atom” burst: middle of the open celebration modal, else visual viewport (handles iPad zoom). */
      function getCelebrationAnchorPx() {
        const vv = window.visualViewport;
        const fbCx = vv ? vv.offsetLeft + vv.width * 0.5 : window.innerWidth * 0.5;
        const fbCy = vv ? vv.offsetTop + vv.height * 0.5 : window.innerHeight * 0.5;
        const setModal = document.querySelector("#setCompleteOverlay.open .modal-set-celebrate");
        if (setModal) {

          return { cx: r.left + r.width / 2, cy: r.top + r.height / 2 };

        const winModal = document.querySelector("#winOverlay.open .modal");
        if (winModal) {
          const r = winModal.getBoundingClientRect();
          return { cx: r.left + r.width / 2, cy: r.top + r.height / 2 };

        return { cx: fbCx, cy: fbCy };
