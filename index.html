<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#0f1419" />
  <title>Synonyms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0b0d10;
      --bg-panel: #11151a;
      --bg-tile: #171c24;
      --bg-tile-hover: #1f2630;
      --letter-ink: #8b99ab;
      --slot-face-top: #f0f2f6;
      --slot-face-bot: #c5ccd6;
      --slot-inset: inset 0 3px 8px rgba(0, 0, 0, 0.32), inset 0 -2px 4px rgba(255, 255, 255, 0.45);
      --slot-ring: rgba(255, 255, 255, 0.35);
      --stroke: rgba(255, 255, 255, 0.06);
      --stroke-strong: rgba(255, 255, 255, 0.1);
      --text: #e8eef5;
      --text-muted: #7a8a9e;
      --accent: #5ee4d4;
      --accent-dim: rgba(94, 228, 212, 0.15);
      --accent-glow: rgba(94, 228, 212, 0.45);
      --gold: #f4d06f;
      --gold-dim: rgba(244, 208, 111, 0.12);
      --success: #7ddf8e;
      --success-bg: rgba(125, 223, 142, 0.12);
      --danger: #ff8b7a;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
      --font-display: "Fraunces", Georgia, serif;
      --font-ui: "Outfit", system-ui, sans-serif;
      /* Header / HUD column — narrower than full app so title + hint don’t span the whole rack */
      --header-max: min(28rem, calc(100vw - 32px));
      /* Match letter tiles to slot cells so one row of letters never needs a narrower tray */
      --rack-tile: clamp(28px, 3.8vw, 36px);
      --row-gap-compact: clamp(4px, 1vh, 8px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      height: -webkit-fill-available;
    }

    html, body {
      overflow: hidden;
    }

    body {
      min-height: 100%;
      min-height: -webkit-fill-available;
      font-family: var(--font-ui);
      background: var(--bg-deep);
      color: var(--text);
      overflow: hidden;
      background-image:
        radial-gradient(ellipse 100% 70% at 50% -20%, rgba(255, 255, 255, 0.04), transparent),
        radial-gradient(ellipse 70% 50% at 100% 0%, rgba(94, 228, 212, 0.03), transparent);
    }

    .app {
      height: 100svh;
      height: 100dvh;
      max-height: 100svh;
      max-height: 100dvh;
      width: 100%;
      max-width: min(1120px, 100%);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: max(6px, env(safe-area-inset-top)) clamp(10px, 2vw, 20px) max(6px, env(safe-area-inset-bottom));
      overflow: hidden;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 4px;
      flex-shrink: 0;
      margin-bottom: 6px;
      width: 100%;
      max-width: var(--header-max);
      margin-left: auto;
      margin-right: auto;
    }

    .logo {
      font-family: var(--font-display);
      font-size: clamp(1.35rem, 3.2vh, 1.85rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.1;
      margin: 0;
    }

    .tagline {
      font-size: clamp(0.68rem, 1.5vh, 0.78rem);
      color: var(--text-muted);
      font-weight: 500;
      text-align: center;
      line-height: 1.35;
      max-width: 36em;
      margin: 0;
    }

    .level-indicator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 6px;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: clamp(0.65rem, 1.45vh, 0.74rem);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(94, 228, 212, 0.28);
      box-shadow: 0 0 20px rgba(94, 228, 212, 0.08);
    }

    .daily-progress {
      margin-top: 0;
      font-size: clamp(0.68rem, 1.5vh, 0.8rem);
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /** Level pill + set — full width above HUD; pill centred, set right-aligned with panel edge */
    .hud-status-meta {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      width: 100%;
      max-width: var(--header-max);
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 6px;
      padding: 0 14px;
      box-sizing: border-box;
    }

    .hud-status-meta .hud-status-spacer {
      grid-column: 1;
    }

    .hud-status-meta .level-indicator {
      grid-column: 2;
      justify-self: center;
      margin-top: 0;
    }

    .hud-status-meta .daily-progress {
      grid-column: 3;
      justify-self: end;
      text-align: right;
    }

    .daily-complete {
      padding: 2rem 1.25rem;
      text-align: center;
      max-width: 22rem;
      margin: 0 auto;
      line-height: 1.5;
    }

    .daily-complete h3 {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .daily-complete p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .replay-btn {
      margin-top: 1rem;
      font-family: var(--font-ui);
      font-size: clamp(0.88rem, 3vw, 0.98rem);
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      width: 100%;
      max-width: 18rem;
      background: linear-gradient(135deg, var(--accent), #3bc4b3);
      color: #061016;
      box-shadow: 0 8px 28px rgba(94, 228, 212, 0.28);
      touch-action: manipulation;
    }

    .replay-btn:active {
      transform: scale(0.98);
    }

    .hud {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: clamp(8px, 2vw, 16px);
      width: 100%;
      max-width: var(--header-max);
      margin-left: auto;
      margin-right: auto;
      padding: 8px 14px;
      background: var(--bg-panel);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .hud-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hud-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      font-weight: 600;
    }

    .hud-value {
      font-size: clamp(1.05rem, 2.8vh, 1.35rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
    }

    .hud-value.moves {
      color: var(--gold);
    }

    .hints-hud {
      flex: 1;
      text-align: center;
      min-width: 0;
    }

    .hints-hud .hud-value {
      color: var(--text-muted);
      font-size: clamp(0.95rem, 2.4vh, 1.15rem);
    }

    .board {
      width: 100%;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--row-gap-compact);
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding-bottom: 2px;
    }

    .row-wrap {
      position: relative;
      background: linear-gradient(180deg, #141a22 0%, #0f1318 100%);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: clamp(10px, 1.4vh, 16px);
      padding: clamp(6px, 1.1vh, 10px) clamp(10px, 1.4vw, 14px);
      flex: 0 1 auto;
      min-height: 0;
      width: fit-content;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition:
        background 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease;
    }

    .row-wrap.row-active:not(.solved) {
      background: linear-gradient(180deg, #1a2532 0%, #121a24 100%);
      border-color: rgba(94, 228, 212, 0.28);
      box-shadow:
        0 0 0 1px rgba(94, 228, 212, 0.18),
        0 6px 28px rgba(94, 228, 212, 0.1);
    }

    .row-head {
      display: flex;
      justify-content: flex-end;
      width: 100%;
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .hint-btn {
      font-family: var(--font-ui);
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(244, 208, 111, 0.35);
      background: rgba(244, 208, 111, 0.1);
      color: var(--gold);
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .hint-btn:hover:not(:disabled) {
      background: rgba(244, 208, 111, 0.18);
    }

    .hint-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .slot.slot-from-hint.filled {
      box-shadow:
        inset 0 2px 6px rgba(0, 0, 0, 0.18),
        inset 0 -1px 0 rgba(255, 255, 255, 0.25),
        0 0 0 1px rgba(244, 208, 111, 0.45);
    }

    .row-wrap:focus {
      outline: none;
    }

    .row-wrap:focus-visible {
      box-shadow: 0 0 0 2px rgba(94, 228, 212, 0.45), 0 0 24px rgba(94, 228, 212, 0.12);
      border-color: rgba(94, 228, 212, 0.35);
    }

    .row-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(6px, 1vh, 10px);
      width: auto;
      max-width: 100%;
      min-height: 0;
      margin-left: auto;
      margin-right: auto;
      box-sizing: border-box;
    }

    .row-wrap.solved {
      border-color: rgba(125, 223, 142, 0.45);
      box-shadow: 0 0 0 1px rgba(125, 223, 142, 0.2), 0 12px 40px rgba(125, 223, 142, 0.08);
      animation: rowPop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes rowPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .letter-tray {
      order: -1;
      display: flex;
      flex-wrap: nowrap;
      gap: clamp(4px, 0.85vw, 7px);
      justify-content: center;
      align-items: center;
      position: relative;
      width: 100%;
      flex: 0 0 auto;
      min-width: 0;
      margin: 0 auto;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
    }

    .letter {
      flex: 0 0 auto;
      width: var(--rack-tile);
      min-width: var(--rack-tile);
      height: clamp(34px, 5vh, 44px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.8rem, 2vw, 0.98rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--letter-ink);
      background: linear-gradient(180deg, #1c232e 0%, #141a22 100%);
      border: 1px solid rgba(0, 0, 0, 0.35);
      border-radius: clamp(8px, 1vh, 11px);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease, box-shadow 0.2s ease, color 0.15s ease;
      touch-action: manipulation;
    }

    .letter:hover {
      background: linear-gradient(180deg, #252d3a 0%, #1a212b 100%);
      color: #aab8ca;
      transform: translateY(-1px);
    }

    .letter:active {
      transform: scale(0.97);
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.35);
    }

    .letter.selected {
      border-color: rgba(94, 228, 212, 0.55);
      color: var(--text);
      background: linear-gradient(180deg, #243038 0%, #1a242c 100%);
      box-shadow:
        0 0 0 1px rgba(94, 228, 212, 0.35),
        0 0 18px rgba(94, 228, 212, 0.22);
      transform: translateY(-2px);
      z-index: 1;
    }

    .letter.used {
      visibility: hidden;
      pointer-events: none;
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    .slots {
      display: flex;
      flex-wrap: nowrap;
      gap: clamp(4px, 0.85vw, 7px);
      justify-content: center;
      align-items: center;
      align-self: center;
      width: max-content;
      flex: 0 0 auto;
      min-width: 0;
      max-width: 100%;
      margin-left: auto;
      margin-right: auto;
    }

    .slot {
      flex: 0 0 auto;
      width: var(--rack-tile);
      min-width: var(--rack-tile);
      height: clamp(34px, 5vh, 44px);
      border-radius: clamp(7px, 1vh, 10px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.8rem, 2vw, 0.98rem);
      font-weight: 700;
      cursor: pointer;
      transition: box-shadow 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
      touch-action: manipulation;
      padding: 0;
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: linear-gradient(180deg, var(--slot-face-top) 0%, var(--slot-face-bot) 100%);
      box-shadow: var(--slot-inset), 0 1px 0 var(--slot-ring);
      color: #1a2230;
    }

    .slot.slot-active.empty {
      color: transparent;
    }

    .slot.slot-active.empty:hover,
    .slot.slot-active.empty:focus-visible {
      border-color: rgba(94, 228, 212, 0.55);
      box-shadow:
        var(--slot-inset),
        0 0 0 2px rgba(94, 228, 212, 0.35);
    }

    .slot.slot-active.filled {
      border-color: rgba(0, 0, 0, 0.18);
      color: #1a2230;
      box-shadow:
        inset 0 2px 6px rgba(0, 0, 0, 0.18),
        inset 0 -1px 0 rgba(255, 255, 255, 0.25),
        0 0 0 1px rgba(94, 228, 212, 0.25);
    }

    /* Keep grid width for centering; hide “ghost” tile chrome on phones */
    .slot.slot-pad {
      pointer-events: none;
      cursor: default;
      opacity: 0;
      visibility: hidden;
      border: none;
      background: transparent;
      box-shadow: none;
    }

    .row-key-proxy {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: 0;
      padding: 0;
      bottom: 0;
      left: 0;
      opacity: 0;
      border: 0;
      outline: none;
      font-size: 16px;
      /* iOS: avoid zoom-on-focus; keep invisible */
      color: transparent;
      caret-color: transparent;
      z-index: 5;
      pointer-events: none;
    }

    .row-key-proxy:focus {
      outline: none;
    }

    .slot.slot-active:active {
      transform: scale(0.97);
    }

    .slot.slot-active:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .row-wrap.solved .slot.slot-active.filled {
      border-color: rgba(60, 120, 75, 0.45);
      color: #2d6a45;
      background: linear-gradient(180deg, #e8f6ec 0%, #c5e6cf 100%);
      box-shadow:
        inset 0 2px 6px rgba(0, 0, 0, 0.12),
        inset 0 -1px 0 rgba(255, 255, 255, 0.4),
        0 0 0 1px rgba(125, 223, 142, 0.45);
      animation: letterReveal 0.4s ease;
    }

    @keyframes letterReveal {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #setCompleteOverlay {
      z-index: 110;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(6, 9, 12, 0.82);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--bg-panel);
      border: 1px solid var(--stroke-strong);
      border-radius: calc(var(--radius) + 4px);
      padding: 28px 26px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow);
      transform: scale(0.92) translateY(16px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal h2 {
      font-family: var(--font-display);
      font-size: 1.65rem;
      margin-bottom: 8px;
      color: var(--gold);
    }

    .modal .score-big {
      font-size: 3rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(180deg, var(--accent), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.2;
      margin: 12px 0;
      transition: transform 0.05s linear;
    }

    .modal .score-big.is-rolling {
      animation: scoreRollTick 0.08s steps(2) infinite;
    }

    @keyframes scoreRollTick {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-2px);
      }
    }

    .modal p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .btn {
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), #3bc4b3);
      color: #061016;
      box-shadow: 0 8px 28px rgba(94, 228, 212, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      touch-action: manipulation;
      width: 100%;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(94, 228, 212, 0.45);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      opacity: 0;
      animation: confetti 1.2s ease-out forwards;
    }

    @keyframes confetti {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) rotate(720deg);
      }
    }

    .modal .theme-reveal {
      font-family: var(--font-display);
      font-size: 1.35rem;
      color: var(--accent);
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .modal .theme-reveal strong {
      color: var(--gold);
      font-weight: 700;
    }

    .modal .theme-reveal .level-line {
      display: block;
      margin-top: 0.35em;
      font-size: 0.92em;
      opacity: 0.78;
    }

    .modal-set-celebrate {
      border-color: rgba(244, 208, 111, 0.35);
      box-shadow:
        var(--shadow),
        0 0 60px rgba(244, 208, 111, 0.12),
        inset 0 0 40px rgba(94, 228, 212, 0.06);
      animation: setCelebratePop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes setCelebratePop {
      0% {
        transform: scale(0.88);
        filter: brightness(1.2);
      }
      100% {
        transform: scale(1);
        filter: brightness(1);
      }
    }

    .set-celebrate-sub {
      margin-bottom: 8px !important;
    }

    #setContinueBtn {
      letter-spacing: 0.12em;
      font-size: 0.92rem;
    }

    .set-complete-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      margin-top: 8px;
    }

    .btn-share-set {
      font-family: var(--font-ui);
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 12px 20px;
      border-radius: 999px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-muted);
      cursor: pointer;
      touch-action: manipulation;
      width: 100%;
      transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .btn-share-set:hover {
      color: var(--accent);
      border-color: rgba(94, 228, 212, 0.35);
      background: rgba(94, 228, 212, 0.08);
    }

    .set-zero-hint-nudge {
      font-family: var(--font-ui);
      margin: 12px 0 4px;
      padding: 0 4px;
      text-align: center;
    }

    .set-zero-hint-head {
      display: block;
      font-size: clamp(0.95rem, 3vw, 1.05rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.3;
      color: var(--gold);
      margin-bottom: 6px;
    }

  <script>
    (function () {
      const LEVEL1_ROUNDS = JSON.parse(
        document.getElementById("synonyms-data-level1").textContent.trim()
      );
      const LEVEL2_ROUNDS = JSON.parse(
        document.getElementById("synonyms-data-level2").textContent.trim() || "[]"
      );
      const LEVEL3_ROUNDS = JSON.parse(
        document.getElementById("synonyms-data-level3").textContent.trim() || "[]"
      );
      const LEVEL4_ROUNDS = JSON.parse(
        document.getElementById("synonyms-data-level4").textContent.trim() || "[]"
      );
      const LEVEL5_ROUNDS = JSON.parse(
        document.getElementById("synonyms-data-level5").textContent.trim() || "[]"
      );

      function hashString(s) {
        let h = 5381;
        for (let i = 0; i < s.length; i++) {
          h = (h << 5) + h + s.charCodeAt(i);
          h = h | 0;
        }
        return Math.abs(h);
      }

      function shuffleSeeded(arr, seedStr) {
        let seed = hashString(seedStr) >>> 0;
        function rnd() {
          seed = (1664525 * seed + 1013904223) >>> 0;
          return seed / 4294967296;
        }
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(rnd() * (i + 1));
          const t = a[i];
          a[i] = a[j];
          a[j] = t;
        }
        return a;
      }

      const ENDLESS_STORAGE_KEY = "synonyms-endless-v3";

      /** Full run: sets of 5 (Level 1→5), aligned across pools. */
      /** @type {{ level: number; theme: string; words: string[] }[]} */
      let endlessDeck = [];
      let endlessSeed = "";
      let endlessPoolFingerprint = "";
      let lifetimeScore = 0;

      let roundIndex = 0;

      function getPoolFingerprint() {
        return [LEVEL1_ROUNDS, LEVEL2_ROUNDS, LEVEL3_ROUNDS, LEVEL4_ROUNDS, LEVEL5_ROUNDS]
          .map(function (p) {
            return p.length;
          })
          .join("-");
      }

      function totalSetsFromDeck(deck) {
        return Math.floor(deck.length / 5);
      }

      function buildSetCycledDeck(seedStr) {
        const pools = [LEVEL1_ROUNDS, LEVEL2_ROUNDS, LEVEL3_ROUNDS, LEVEL4_ROUNDS, LEVEL5_ROUNDS];
        const n = Math.min.apply(
          null,
          pools.map(function (p) {
            return p.length;
          })
        );
        if (n <= 0) return [];
        const shuffledByLevel = pools.map(function (pool, idx) {
          return shuffleSeeded(pool.slice(0, n), seedStr + "-L" + (idx + 1));
        });
        const deck = [];
        for (let s = 0; s < n; s++) {
          for (let L = 0; L < 5; L++) {
            deck.push(shuffledByLevel[L][s]);
          }
        }
        return deck;
      }

      function loadEndlessState() {
        try {
          const raw = localStorage.getItem(ENDLESS_STORAGE_KEY);
          if (!raw) return null;
          const o = JSON.parse(raw);
          return {
            seed: typeof o.seed === "string" ? o.seed : "",
            puzzleIndex: typeof o.puzzleIndex === "number" ? o.puzzleIndex : 0,
            totalScore: typeof o.totalScore === "number" ? o.totalScore : 0,
            setHints: typeof o.setHints === "number" ? o.setHints : 0,
            poolRevision:
              typeof o.poolRevision === "string"
                ? o.poolRevision
                : typeof o.poolRevision === "number"
                  ? String(o.poolRevision)
                  : "",
          };
        } catch (e) {
          return null;
        }
      }

      function saveEndlessState() {
        try {
          localStorage.setItem(
            ENDLESS_STORAGE_KEY,
            JSON.stringify({
              seed: endlessSeed,
              puzzleIndex: roundIndex,
              totalScore: lifetimeScore,
              setHints: hintsThisSet,
              poolRevision: endlessPoolFingerprint,
            })
          );
        } catch (e) {}
      }

      function ensureEndlessDeck() {
        const fp = getPoolFingerprint();
        let st = loadEndlessState();
        if (!st) {
          st = { seed: "", puzzleIndex: 0, totalScore: 0, setHints: 0, poolRevision: "" };
        }
        if (!st.seed) {
          st.seed =
            typeof crypto !== "undefined" && crypto.randomUUID
              ? crypto.randomUUID()
              : "syn-" + Date.now() + "-" + Math.floor(Math.random() * 1e9);
        }
        if (st.poolRevision !== fp) {
          st.puzzleIndex = 0;
          st.poolRevision = fp;
          st.setHints = 0;
        }
        endlessSeed = st.seed;
        endlessPoolFingerprint = fp;
        endlessDeck = buildSetCycledDeck(endlessSeed + "|fp=" + fp);
        lifetimeScore = st.totalScore;
        roundIndex = Math.min(Math.max(0, st.puzzleIndex), endlessDeck.length);
        hintsThisSet = typeof st.setHints === "number" ? st.setHints : 0;
        saveEndlessState();

      function startNewShuffleKeepScore() {
        endlessSeed =
          typeof crypto !== "undefined" && crypto.randomUUID

            : "syn-" + Date.now() + "-" + Math.floor(Math.random() * 1e9);

        endlessPoolFingerprint = getPoolFingerprint();
        endlessDeck = buildSetCycledDeck(endlessSeed + "|fp=" + endlessPoolFingerprint);

      /**

      const SLOT_GRID = 15;

                    '" (' +
                    w.length +

                    round.theme +
                    '" L' +
                    round.level +
                    " exceeds MAX_WORD_LEN (" +

            });

      })();

      let moves = 0;
      let cluesUsed = 0;

      let selectedLetterId = null;

      let lastRoundPrevLifetime = 0;
      /** Hints used across the five puzzles of the current set (resets each new set). */
      let hintsThisSet = 0;

      const PLAY_URL = "https://planomy.github.io/synonyms";

      const ZERO_HINT_SHARE_NUDGES = [
        "Brag a little — you've earned it. Tap Share.",

      const board = document.getElementById("board");

      function shuffle(arr) {
        const a = arr.slice();

      function updateHintsHud() {

        else hintsHudEl.textContent = cluesUsed + " hints";

      /**

       */
      function computeScore(words, moveCount, hintPenalty) {
        const par = minMovesPar(words);
        const streak = roundIndex * 120;
        if (moveCount <= 0) {
          return Math.max(150, 720 + streak - hintPenalty);
        }
        const moveRatio = Math.min(1, par / moveCount);
        const base = Math.round(4000 * moveRatio * moveRatio);
        return Math.max(150, base + streak - hintPenalty);
      }

      /** Count up the big score on the win modal only (HUD updates when finished). */
      function animateScoreOnSplash(modalEl, target, durationMs, onDone) {
        const from = Math.max(
          0,
          Math.min(target - 1, Math.floor(target * 0.1 + 50 + Math.min(180, target * 0.2)))
        );
        const t0 = performance.now();
        modalEl.classList.add("is-rolling");
        modalEl.textContent = String(from);
        function tick(now) {
          const u = Math.min(1, (now - t0) / durationMs);
          const eased = 1 - Math.pow(1 - u, 4);
          modalEl.textContent = String(Math.round(from + (target - from) * eased));
          if (u < 1) {
            requestAnimationFrame(tick);
          } else {
            modalEl.textContent = String(target);
            modalEl.classList.remove("is-rolling");
            if (onDone) onDone();
          }
        }
        requestAnimationFrame(tick);
      }

      /** Explicit range roll (e.g. lifetime tally on set complete). */
      function animateNumberFromTo(modalEl, fromVal, toVal, durationMs, onDone) {
        const from = Math.round(fromVal);
        const to = Math.round(toVal);
        const t0 = performance.now();
        modalEl.classList.add("is-rolling");
        modalEl.textContent = String(from);
        function tick(now) {
          const u = Math.min(1, (now - t0) / durationMs);
          const eased = 1 - Math.pow(1 - u, 4);
          modalEl.textContent = String(Math.round(from + (to - from) * eased));
          if (u < 1) {
            requestAnimationFrame(tick);
          } else {
            modalEl.textContent = String(to);
            modalEl.classList.remove("is-rolling");
            if (onDone) onDone();
          }
        }
        requestAnimationFrame(tick);
      }

      /** Message body only — URL is passed separately in navigator.share({ url }) to avoid duplicate links. */
      function buildSetShareBody() {
        const zeroHints = hintsThisSet === 0;
        const headline = zeroHints
          ? "I solved this set with zero hints!"
          : "I cleared a set in Synonyms!";
        return headline + " Total score: " + lifetimeScore + " pts.";
      }

      /** Full text when copying (single URL, no separate Web Share API url field). */
      function buildSetShareClipboardText() {
        return buildSetShareBody() + "\n" + PLAY_URL;
      }

      function copySetShareFallback(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(
            function () {
              if (setShareBtn) {
                var prev = setShareBtn.textContent;
                setShareBtn.textContent = "Copied";
                setTimeout(function () {
                  setShareBtn.textContent = prev;
                }, 1600);
              }
            },
            function () {
              window.prompt("Copy your message:", text);
            }
          );
        } else {
          window.prompt("Copy your message:", text);
        }
      }

      function shareSetComplete() {
        const body = buildSetShareBody();
        const clipboardText = buildSetShareClipboardText();
        if (navigator.share) {
          navigator
            .share({ title: "Synonyms", text: body, url: PLAY_URL })
            .catch(function () {
              copySetShareFallback(clipboardText);
            });
        } else {
          copySetShareFallback(clipboardText);
        }
      }

      function openSetCompleteCelebration() {
        if (setZeroHintNudgeEl && setZeroHintMsgEl) {
          if (hintsThisSet === 0) {
            setZeroHintMsgEl.textContent = randomZeroHintShareNudge();
            setZeroHintNudgeEl.hidden = false;
          } else {
            setZeroHintMsgEl.textContent = "";
            setZeroHintNudgeEl.hidden = true;
          }
        }
        burstConfetti();
        setTimeout(function () {
          burstConfetti();
        }, 200);
        setTallyScoreEl.textContent = String(lastRoundPrevLifetime);
        setCompleteOverlay.classList.add("open");
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            animateNumberFromTo(setTallyScoreEl, lastRoundPrevLifetime, lifetimeScore, 2200, function () {
              setContinueBtn.focus();
            });
          });
        });
      }

      function formatClock(sec) {
        const s = Math.max(0, sec);
        const m = Math.floor(s / 60);
        const r = s - m * 60;
        const tenth = Math.floor((r % 1) * 10);
        const whole = Math.floor(r);
        return m + ":" + String(whole).padStart(2, "0") + "." + tenth;
      }

      function beginRoundTiming() {
        roundStartMs = performance.now();
      }

      function burstConfetti() {
        const colors = ["#5ee4d4", "#f4d06f", "#7ddf8e", "#ff8b7a", "#a78bfa"];
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 3;
        for (let i = 0; i < 48; i++) {
          const dot = document.createElement("span");
          dot.className = "particle";
          dot.style.left = cx + "px";
          dot.style.top = cy + "px";
          dot.style.background = colors[i % colors.length];
          const dx = (Math.random() - 0.5) * 420;
          const dy = Math.random() * 320 + 80;
          dot.style.setProperty("--dx", dx + "px");
          dot.style.setProperty("--dy", dy + "px");
          particlesEl.appendChild(dot);
          setTimeout(() => dot.remove(), 1300);
        }
      }

      function clearSelection() {
        selectedLetterId = null;
        document.querySelectorAll(".letter.selected").forEach((el) => el.classList.remove("selected"));
      }

      function bumpMoves() {
        moves++;
        moveCountEl.textContent = String(moves);
      }

      function allRowsSolved() {
        return document.querySelectorAll(".row-wrap").length === document.querySelectorAll(".row-wrap.solved").length;
      }

      function checkRow(rowEl, word) {
        const slots = rowEl.querySelectorAll(".slot.slot-active");
        let filled = "";
        slots.forEach((s) => {
          filled += s.textContent.trim() || "";
        });
        if (filled.length !== word.length) return false;
        if (filled !== word) return false;
        if (!rowEl.classList.contains("solved")) {
          rowEl.classList.add("solved");
        }
        return true;
      }

      function tryFinishRound(words, theme) {
        if (roundComplete || !allRowsSolved()) return;
        roundComplete = true;
        elapsedAtFinishSec = (performance.now() - roundStartMs) / 1000;
        burstConfetti();
        const hintPen = totalHintPenalty();
        const score = computeScore(words, moves, hintPen);
        lastRoundPrevLifetime = lifetimeScore;
        lifetimeScore += score;
        pendingSetCelebration = endlessDeck.length > 0 && (roundIndex + 1) % 5 === 0;
        saveEndlessState();
        const par = minMovesPar(words);
        scoreDisplayEl.textContent = "\u2014";
        finalScoreEl.textContent = "0";
        themeRevealEl.hidden = false;
        themeRevealEl.innerHTML =
          "These were synonyms of<br /><strong>" +
          escapeHtml(theme) +
          "</strong><span class=\"level-line\">Level " +
          escapeHtml(String(roundCtx.level || 1)) +
          "</span>";
        const hintLine =
          cluesUsed === 0
            ? "No hints used."
            : "<strong>" +
              cluesUsed +
              "</strong> hint" +
              (cluesUsed === 1 ? "" : "s") +
              " (&minus;<strong>" +
              hintPen +
              "</strong> pts).";
        winMessageEl.innerHTML =
          "<strong>" +
          moves +
          "</strong> moves &middot; par <strong>" +
          par +
          "</strong><br />Time: <strong>" +
          formatClock(elapsedAtFinishSec) +
          "</strong> (not scored)<br />" +
          hintLine;
        const runLen = endlessDeck.length;
        const isLastRound = runLen > 0 && roundIndex >= runLen - 1;
        nextRoundBtn.textContent = isLastRound ? "Done" : "Next round";
        winOverlay.classList.add("open");
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            animateScoreOnSplash(finalScoreEl, score, 1650, function () {
              scoreDisplayEl.textContent = String(lifetimeScore);
              winOverlay.querySelector(".btn").focus();
            });
          });
        });
      }

      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function returnLetterFromSlot(rowWrap, slotEl) {
        if (!slotEl.classList.contains("filled")) return;
        const ch = slotEl.textContent;
        const tray = rowWrap.querySelector(".letter-tray");
        const poolBtn = document.createElement("button");
        poolBtn.type = "button";
        poolBtn.className = "letter";
        poolBtn.textContent = ch;
        const rid = "r" + rowWrap.dataset.row + "-return-" + Math.random().toString(36).slice(2, 8);
        poolBtn.dataset.id = rid;
        poolBtn.dataset.char = ch;
        poolBtn.dataset.row = rowWrap.dataset.row || "";
        poolBtn.setAttribute("aria-label", "Letter " + ch);
        tray.appendChild(poolBtn);
        slotEl.textContent = "";
        slotEl.classList.remove("filled", "slot-from-hint");
        slotEl.classList.add("empty");
        delete slotEl.dataset.fromHint;
        slotEl.setAttribute("aria-label", "Slot " + (Number(slotEl.dataset.index) + 1) + " empty");
        rowWrap.classList.remove("solved");
        bumpMoves();
        clearSelection();
        syncHintButtons();
      }

      /**
       * @param {HTMLElement|null} specificSlot empty slot from a tap, or null for first empty (typing).
       */
      function placeLetterFromTray(rowWrap, letterBtn, specificSlot) {
        const word = rowWrap.dataset.word || "";
        const slotEl =
          specificSlot &&
          specificSlot.classList.contains("slot-active") &&
          specificSlot.classList.contains("empty")
            ? specificSlot
            : rowWrap.querySelector(".slot.slot-active.empty");
        if (!slotEl || letterBtn.classList.contains("used")) return;
        letterBtn.classList.add("used");
        letterBtn.classList.remove("selected");
        selectedLetterId = null;
        slotEl.textContent = letterBtn.textContent;
        slotEl.classList.add("filled");
        slotEl.classList.remove("empty");
        slotEl.setAttribute(
          "aria-label",
          "Slot " + (Number(slotEl.dataset.index) + 1) + ": " + letterBtn.textContent
        );
        bumpMoves();
        checkRow(rowWrap, word);
        syncHintButtons();
        tryFinishRound(roundCtx.words, roundCtx.theme);
      }

      function recallLastFilled(rowWrap) {
        const slots = rowWrap.querySelectorAll(".slot.slot-active");
        for (let i = slots.length - 1; i >= 0; i--) {
          if (slots[i].classList.contains("filled")) {
            returnLetterFromSlot(rowWrap, slots[i]);
            return;
          }
        }
      }

      function canApplyHint(rowWrap) {
        if (roundComplete || rowWrap.classList.contains("solved")) return false;
        const word = rowWrap.dataset.word || "";
        const slots = rowWrap.querySelectorAll(".slot.slot-active");
        const tray = rowWrap.querySelector(".letter-tray");
        if (!tray) return false;
        for (let i = 0; i < slots.length; i++) {
          if (!slots[i].classList.contains("empty")) continue;
          const need = word[i];
          const letters = tray.querySelectorAll(".letter:not(.used)");
          for (let j = 0; j < letters.length; j++) {
            if (letters[j].textContent === need) return true;
          }
          return false;
        }
        return false;
      }

      function syncHintButtons() {
        document.querySelectorAll(".row-wrap").forEach(function (rw) {
          const btn = rw.querySelector(".hint-btn");
          if (!btn) return;
          const ok = canApplyHint(rw);
          btn.disabled = !ok;
          btn.textContent = "Hint";
        });
      }

      function applyHint(rowWrap) {
        if (roundComplete || rowWrap.classList.contains("solved")) return;
        const word = rowWrap.dataset.word || "";
        const slots = rowWrap.querySelectorAll(".slot.slot-active");
        const tray = rowWrap.querySelector(".letter-tray");
        if (!tray) return;
        let targetSlot = null;
        let idx = -1;
        for (let i = 0; i < slots.length; i++) {
          if (slots[i].classList.contains("empty")) {
            targetSlot = slots[i];
            idx = i;
            break;
          }
        }
        if (!targetSlot || idx < 0) return;
        const need = word[idx];
        const letters = tray.querySelectorAll(".letter:not(.used)");
        let btn = null;
        for (let j = 0; j < letters.length; j++) {
          if (letters[j].textContent === need) {
            btn = letters[j];
            break;
          }
        }
        if (!btn) return;
        cluesUsed++;
        hintsThisSet++;
        saveEndlessState();
        updateHintsHud();
        btn.classList.add("used");
        btn.classList.remove("selected");
        selectedLetterId = null;
        clearSelection();
        targetSlot.textContent = need;
        targetSlot.classList.add("filled", "slot-from-hint");
        targetSlot.classList.remove("empty");
        targetSlot.dataset.fromHint = "1";
        targetSlot.setAttribute("aria-label", "Slot " + (idx + 1) + ": " + need + " (hint)");
        checkRow(rowWrap, word);
        syncHintButtons();
        tryFinishRound(roundCtx.words, roundCtx.theme);
      }

      document.addEventListener(
        "keydown",
        function (e) {
          if (roundComplete) return;
          if (winOverlay.classList.contains("open")) return;
          if (setCompleteOverlay.classList.contains("open")) return;
          const wrap = board.querySelector(".row-wrap:focus-within");
          if (!wrap) return;
          if (e.ctrlKey || e.metaKey || e.altKey) return;

          if (e.key === "Backspace") {
            e.preventDefault();
            recallLastFilled(wrap);
            return;
          }

          if (e.key.length !== 1) return;
          const key = e.key.toUpperCase();
          if (key < "A" || key > "Z") return;
          e.preventDefault();
          const letters = wrap.querySelectorAll(".letter:not(.used)");
          for (let k = 0; k < letters.length; k++) {
            if (letters[k].textContent === key) {
              placeLetterFromTray(wrap, letters[k], null);
              return;
            }
          }
        },
        true
      );

      function showCollectionComplete() {
        roundComplete = true;
        board.innerHTML =
          "<div class=\"daily-complete\"><h3>Collection complete</h3><p>You solved all <strong>" +
          endlessDeck.length +
          "</strong> puzzles.</p><p style=\"margin-top:0.65rem\">Total score: <strong>" +
          lifetimeScore +
          "</strong></p><button type=\"button\" class=\"replay-btn\" id=\"replayShuffleBtn\">New shuffle</button></div>";
        board.onclick = null;
        levelIndicatorEl.textContent = "Complete";
        dailyProgressEl.textContent =
          "Set " + totalSetsFromDeck(endlessDeck) + " / " + totalSetsFromDeck(endlessDeck);
        const replay = board.querySelector("#replayShuffleBtn");
        if (replay) {
          replay.addEventListener("click", function () {
            startNewShuffleKeepScore();
          });
        }
        saveEndlessState();
      }

      function buildRound() {
        ensureEndlessDeck();

        roundComplete = false;
        moves = 0;
        cluesUsed = 0;
        selectedLetterId = null;
        elapsedAtFinishSec = 0;
        moveCountEl.textContent = "0";
        scoreDisplayEl.textContent = endlessDeck.length ? String(lifetimeScore) : "\u2014";
        updateHintsHud();
        themeRevealEl.hidden = true;
        themeRevealEl.textContent = "";
        nextRoundBtn.textContent = "Next round";

        if (!endlessDeck.length) {
          levelIndicatorEl.textContent = "\u2014";
          dailyProgressEl.textContent = "";
          board.innerHTML =
            "<p style=\"padding:1rem;text-align:center\">No puzzle rounds loaded.</p>";
          board.onclick = null;
          return;
        }

        if (roundIndex >= endlessDeck.length) {
          showCollectionComplete();
          return;
        }

        if (roundIndex % 5 === 0) {
          hintsThisSet = 0;
        }

        saveEndlessState();

        const data = endlessDeck[roundIndex];
        roundCtx = {
          words: data.words,
          theme: data.theme,
          level: typeof data.level === "number" ? data.level : 1,
        };
        levelIndicatorEl.textContent = "Level " + roundCtx.level;
        const ts = totalSetsFromDeck(endlessDeck);
        dailyProgressEl.textContent =
          "Set " + (ts ? Math.floor(roundIndex / 5) + 1 : 0) + " / " + (ts || 0);
        board.innerHTML = "";
        beginRoundTiming();

        data.words.forEach((word, rowIdx) => {
          const letters = shuffle(word.split(""));
          const wrap = document.createElement("div");
          wrap.className = "row-wrap";
          wrap.tabIndex = -1;
          wrap.setAttribute("role", "group");
          wrap.setAttribute(
            "aria-label",
            "Word " + (rowIdx + 1) + " — tap letters or the row, then type A–Z, or place tiles with tap."
          );
          wrap.dataset.word = word;
          wrap.dataset.row = String(rowIdx);

          wrap.addEventListener("click", function (ev) {
            if (ev.target === wrap) focusRowKeyProxy(wrap);
          });
          wrap.addEventListener("mousedown", function (ev) {
            if (roundComplete) return;
            if (!/** @type {HTMLElement} */ (ev.target).closest(".hint-btn")) {
              focusRowKeyProxy(wrap);
            }
          });
          wrap.addEventListener("focusin", function () {
            if (roundComplete) return;
            wrap.classList.add("row-active");
          });
          wrap.addEventListener("focusout", function (ev) {
            const next = /** @type {FocusEvent} */ (ev).relatedTarget;
            if (!next || !wrap.contains(next)) {
              wrap.classList.remove("row-active");
            }
          });

          const tray = document.createElement("div");
          tray.className = "letter-tray";
          tray.setAttribute("role", "group");
          tray.setAttribute("aria-label", "Scrambled letters");

          letters.forEach((ch, i) => {
            const id = "r" + rowIdx + "-l" + i + "-" + ch + "-" + Math.random().toString(36).slice(2, 7);
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "letter";
            btn.textContent = ch;
            btn.dataset.id = id;
            btn.dataset.char = ch;
            btn.dataset.row = String(rowIdx);
            btn.setAttribute("aria-label", "Letter " + ch);
            tray.appendChild(btn);
          });

          const slotsRow = document.createElement("div");
          slotsRow.className = "slots";
          slotsRow.setAttribute("role", "group");
          slotsRow.setAttribute("aria-label", "Answer slots");

          const wordLen = word.length;
          const leftPadCount = Math.floor((SLOT_GRID - wordLen) / 2);
          for (let i = 0; i < SLOT_GRID; i++) {
            if (i < leftPadCount || i >= leftPadCount + wordLen) {
              const pad = document.createElement("span");
              pad.className = "slot slot-pad";
              pad.setAttribute("aria-hidden", "true");
              slotsRow.appendChild(pad);
            } else {
              const wi = i - leftPadCount;
              const slot = document.createElement("button");
              slot.type = "button";
              slot.className = "slot slot-active empty";
              slot.dataset.index = String(wi);
              slot.dataset.row = String(rowIdx);
              slot.setAttribute("aria-label", "Slot " + (wi + 1) + " empty");
              slotsRow.appendChild(slot);
            }
          }

          const rowHead = document.createElement("div");
          rowHead.className = "row-head";
          const hintBtn = document.createElement("button");
          hintBtn.type = "button";
          hintBtn.className = "hint-btn";
          hintBtn.setAttribute("aria-label", "Reveal the next letter (reduces final score)");
          hintBtn.addEventListener("click", function (ev) {
            ev.stopPropagation();
            applyHint(wrap);
          });
          rowHead.appendChild(hintBtn);

          const inner = document.createElement("div");
          inner.className = "row-inner";
          inner.appendChild(slotsRow);
          inner.appendChild(tray);
          wrap.appendChild(rowHead);
          wrap.appendChild(inner);

          const keyProxy = document.createElement("input");
          keyProxy.type = "text";
          keyProxy.className = "row-key-proxy";
          keyProxy.setAttribute("inputmode", "text");
          keyProxy.setAttribute("enterkeyhint", "done");
          keyProxy.setAttribute("autocomplete", "off");
          keyProxy.setAttribute("autocorrect", "off");
          keyProxy.setAttribute("autocapitalize", "characters");
          keyProxy.setAttribute("spellcheck", "false");
          keyProxy.setAttribute(
            "aria-label",
            "Type letters for word " + (rowIdx + 1)
          );
          keyProxy.tabIndex = -1;
          keyProxy.addEventListener("input", function () {
            if (roundComplete) return;
            var raw = keyProxy.value || "";
            keyProxy.value = "";
            var lettersOnly = raw.replace(/[^a-zA-Z]/g, "");
            if (!lettersOnly.length) return;
            var key = lettersOnly.charAt(lettersOnly.length - 1).toUpperCase();
            if (key < "A" || key > "Z") return;
            var trayLetters = wrap.querySelectorAll(".letter:not(.used)");
            for (var ki = 0; ki < trayLetters.length; ki++) {
              if (trayLetters[ki].textContent === key) {
                placeLetterFromTray(wrap, trayLetters[ki], null);
                return;
              }
            }
          });
          wrap.appendChild(keyProxy);

          board.appendChild(wrap);
        });

        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            board.querySelectorAll(".row-inner").forEach(function (inner) {
              const sr = inner.querySelector(".slots");
              if (sr) {
                inner.style.width = Math.ceil(sr.getBoundingClientRect().width) + "px";
              }
            });
            syncHintButtons();
          });
        });

        board.onclick = function (e) {
          if (roundComplete) return;
          const t = /** @type {HTMLElement} */ (e.target);
          const letterEl = t.closest(".letter");
          const slotEl = t.closest(".slot.slot-active");

          if (letterEl && !letterEl.classList.contains("used")) {
            const same = letterEl.classList.contains("selected");
            clearSelection();
            if (!same) {
              letterEl.classList.add("selected");
              selectedLetterId = letterEl.dataset.id || null;
            }
            const lw = letterEl.closest(".row-wrap");
            if (lw) focusRowKeyProxy(lw);
            return;
          }

          if (slotEl && wrapFor(slotEl)) {
            const rowWrap = wrapFor(slotEl);
            const word = rowWrap.dataset.word || "";

            if (slotEl.classList.contains("filled")) {
              returnLetterFromSlot(rowWrap, slotEl);
              return;
            }

            if (slotEl.classList.contains("empty") && selectedLetterId) {
              const selected = document.querySelector('.letter.selected[data-row="' + rowWrap.dataset.row + '"]');
              if (!selected) {
                clearSelection();
                return;
              }
              placeLetterFromTray(rowWrap, selected, slotEl);
            }
          }
        };
      }

      function wrapFor(el) {
        return el.closest(".row-wrap");
      }

      /** Real `<input>` so iOS/Android show the software keyboard; `div[tabindex]` does not. */
      function focusRowKeyProxy(wrap) {
        if (!wrap) return;
        const proxy = wrap.querySelector(".row-key-proxy");
        if (proxy) {
          proxy.focus({ preventScroll: true });
        }
      }

      nextRoundBtn.addEventListener("click", function () {
        winOverlay.classList.remove("open");
        if (roundIndex >= endlessDeck.length) return;
        if (pendingSetCelebration) {
          openSetCompleteCelebration();
          return;
        }
        roundIndex++;
        saveEndlessState();
        buildRound();
      });

      setShareBtn.addEventListener("click", function () {
        shareSetComplete();
      });

      setContinueBtn.addEventListener("click", function () {
        setCompleteOverlay.classList.remove("open");
        pendingSetCelebration = false;
        if (roundIndex >= endlessDeck.length) return;
        roundIndex++;
        saveEndlessState();
        buildRound();
      });

      buildRound();
    })();
  </script>
</body>
</html>
