      /**
       * Few orbiting “electrons” with fading trails + mist (layer above round & set overlays).
       * @param {boolean} isFast
       * @param {boolean} isClean
       * @param {number} [intensityScale]
       * @param {{ liftAboveSet?: boolean }} [options] liftAboveSet raises z-index for set-complete screen
       */
      function burstRoundWinCelebration(isFast, isClean, intensityScale, options) {
        if (!celebrationParticlesEl) return;
        intensityScale = intensityScale == null ? 1 : intensityScale;
        options = options || {};
        const liftAboveSet = !!options.liftAboveSet;
        const anchor = getCelebrationAnchorPx();
        celebrationParticlesEl.style.setProperty("--cele-anchor-x", anchor.cx + "px");
        celebrationParticlesEl.style.setProperty("--cele-anchor-y", anchor.cy + "px");
        if (liftAboveSet) {
          celebrationParticlesEl.classList.add("celebration-particles--lifted");
          if (celebrationLiftResetTimer) window.clearTimeout(celebrationLiftResetTimer);
          celebrationLiftResetTimer = window.setTimeout(function () {
            celebrationParticlesEl.classList.remove("celebration-particles--lifted");
            celebrationLiftResetTimer = null;
          }, 2800);
        }

        const reduceMotion =
          window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        if (!reduceMotion) {
          celebrationParticlesEl.classList.add("celebration-particles--active");
          if (celebrationMistClearTimer) window.clearTimeout(celebrationMistClearTimer);
          celebrationMistClearTimer = window.setTimeout(function () {
            celebrationParticlesEl.classList.remove("celebration-particles--active");
            celebrationMistClearTimer = null;
          }, 720);
        }

        const combo = isFast && isClean;
        const special = isFast || isClean;
        const rb = special ? 1.06 : 1;

        function buildElectronLayouts() {
          const inner = [
            { phase: 0, r: 40 },
            { phase: 120, r: 40 },
            { phase: 240, r: 40 },
          ].map(function (o, j) {
            return {
              phase: o.phase,
              r: Math.round(o.r * rb),
              sweep: reduceMotion ? 200 : 720 + (j % 2) * 90,
              squish: 0.54,
              dur: reduceMotion ? 0.45 : 2.52 + j * 0.07,
            };
          });
          const mid = [
            { phase: 30, r: 66 },
            { phase: 120, r: 66 },
            { phase: 210, r: 66 },
            { phase: 300, r: 66 },
          ].map(function (o, j) {
            return {
              phase: o.phase,
              r: Math.round(o.r * rb),
              sweep: reduceMotion ? -200 : -(585 + j * 22),
              squish: 1,
              dur: reduceMotion ? 0.48 : 3.02 + j * 0.06,
            };
          });
          const outer = [
            { phase: 18, r: 92 },
            { phase: 138, r: 92 },
            { phase: 258, r: 92 },
          ].map(function (o, j) {
            return {
              phase: o.phase,
              r: Math.round(o.r * rb),
              sweep: reduceMotion ? 220 : 828 + j * 40,
              squish: 0.48,
              dur: reduceMotion ? 0.5 : 2.88 + j * 0.08,
            };
          });
          return inner.concat(mid).concat(outer);
        }

        function pickElectronLayouts(layouts, n) {
          if (n >= layouts.length) return layouts.slice();
          const byShell = [layouts.slice(0, 3), layouts.slice(3, 7), layouts.slice(7, 10)];
          const picked = [];
          let row = 0;
          while (picked.length < n) {
            for (let s = 0; s < byShell.length && picked.length < n; s++) {
              if (byShell[s][row]) picked.push(byShell[s][row]);
            }
            row++;
          }
          return picked;
        }

        const allLayouts = buildElectronLayouts();
        let total = Math.round(10 * intensityScale);
        total = Math.max(reduceMotion ? 3 : 4, Math.min(10, total));
        const chosen = pickElectronLayouts(allLayouts, total);

        const bioTeal = "#5ee4d4";
        const bioCyan = "#6af0ff";
        const bioBlue = "#78b8ff";
        const bioSea = "#3bc4b3";
        const bioViolet = "#b4a3ff";
        const bioMist = "#a8e8f0";
        const bioWarm = "#f0e6b4";
        let palette;
        if (combo) {
          palette = [bioCyan, bioTeal, bioBlue, bioViolet, "#d4c4ff", bioWarm];
        } else if (isFast) {
          palette = [bioCyan, bioWarm, bioTeal, bioBlue, "#ffe9a8"];
        } else if (isClean) {
          palette = [bioTeal, bioMist, bioSea, bioViolet, bioCyan];
        } else {
          palette = [bioTeal, bioCyan, bioBlue, bioViolet, bioSea];
        }

        const cx = anchor.cx;
        const cy = anchor.cy;
        const stagger = reduceMotion ? 0.04 : 0.055;
        let orbitEndSec = 0;
        for (let i = 0; i < chosen.length; i++) {
          orbitEndSec = Math.max(orbitEndSec, chosen[i].dur + i * stagger);
        }
        const lifeMs = Math.ceil((orbitEndSec + 0.45) * 1000);

        for (let i = 0; i < chosen.length; i++) {
          const L = chosen[i];
          const delay = i * stagger;

          const wrap = document.createElement("span");
          wrap.className = "cele-electron";
          wrap.style.left = cx + "px";
          wrap.style.top = cy + "px";
          wrap.style.setProperty("--phase", L.phase + "deg");
          wrap.style.setProperty("--sweep", L.sweep + "deg");
          wrap.style.setProperty("--r", L.r + "px");
          wrap.style.setProperty("--squish", String(L.squish));
          wrap.style.setProperty("--orbit-dur", L.dur + "s");
          wrap.style.animationDelay = delay + "s";

          const body = document.createElement("span");
          body.className = "cele-electron__body";
          body.style.color = palette[i % palette.length];

          wrap.appendChild(body);
          celebrationParticlesEl.appendChild(wrap);

          const w = wrap;
          window.setTimeout(function () {
            if (w.parentNode) w.remove();
          }, lifeMs);
        }
      }

      function clearSelection() {
        selectedLetterId = null;
        document.querySelectorAll(".letter.selected").forEach((el) => el.classList.remove("selected"));
      }

      function bumpMoves() {
        moves++;
        moveCountEl.textContent = String(moves);
      }

      function allRowsSolved() {
        return document.querySelectorAll(".row-wrap").length === document.querySelectorAll(".row-wrap.solved").length;
      }

      function syncRowInnerWidth(rowWrap) {
        const inner = rowWrap.querySelector(".row-inner");
        const sr = inner && inner.querySelector(".slots");
        if (inner && sr) {
          inner.style.width = Math.ceil(sr.getBoundingClientRect().width) + "px";
        }
      }

      function appendReturnedLetterToTray(rowWrap, ch) {
        const tray = rowWrap.querySelector(".letter-tray");
        if (!tray) return;
        const poolBtn = document.createElement("button");
        poolBtn.type = "button";
        poolBtn.className = "letter";
        poolBtn.textContent = ch;
        const rid = "r" + rowWrap.dataset.row + "-return-" + Math.random().toString(36).slice(2, 8);
        poolBtn.dataset.id = rid;
        poolBtn.dataset.char = ch;
        poolBtn.dataset.row = rowWrap.dataset.row || "";
        poolBtn.setAttribute("aria-label", "Letter " + ch);
        tray.appendChild(poolBtn);
      }

      function emptySlot(slotEl, rowWrap) {
        slotEl.textContent = "";
        slotEl.classList.remove("filled", "slot-from-hint");
        slotEl.classList.add("empty");
        delete slotEl.dataset.fromHint;
        slotEl.setAttribute("aria-label", "Slot " + (Number(slotEl.dataset.index) + 1) + " empty");
        rowWrap.classList.remove("solved");
      }

      /**
       * All slots filled but letters ≠ answer — show red tiles until the player clears the row.
       */
      function syncWrongGuessState(rowWrap) {
        const word = rowWrap.dataset.word || "";
        if (rowWrap.classList.contains("solved")) {
          rowWrap.classList.remove("row-wrong");
          rowWrap.removeAttribute("title");
          return;
        }
        const slots = rowWrap.querySelectorAll(".slot.slot-active");
        let filled = "";
        let allFilled = true;
        for (let i = 0; i < slots.length; i++) {
          const s = slots[i];
          filled += (s.textContent.trim() || "");
          if (!s.classList.contains("filled")) allFilled = false;
        }
        if (allFilled && word.length > 0 && filled.length === word.length && filled !== word) {
          rowWrap.classList.add("row-wrong");
          rowWrap.setAttribute("title", "Not quite — tap to clear and try again");
        } else {
          rowWrap.classList.remove("row-wrong");
          rowWrap.removeAttribute("title");
        }
      }

      /** Clear a wrong full guess back to the tray (does not add moves). */
      function resetWrongGuessRow(rowWrap) {
        if (!rowWrap.classList.contains("row-wrong")) return;
        rowWrap.classList.remove("row-wrong");
        rowWrap.removeAttribute("title");
        const filledSlots = Array.from(rowWrap.querySelectorAll(".slot.slot-active.filled"));
        filledSlots.forEach(function (slotEl) {
          const ch = slotEl.textContent;
          appendReturnedLetterToTray(rowWrap, ch);
          emptySlot(slotEl, rowWrap);
        });
        clearSelection();
        syncHudHintButton();
        syncRowInnerWidth(rowWrap);
      }

      const ROW_SOLVE_FLOAT_POINTS = 5;

      function spawnRowPointsFloat(rowWrap) {
        const el = document.createElement("span");
        el.className = "row-points-float";
        el.setAttribute("aria-hidden", "true");
        const main = document.createElement("span");
        main.className = "row-points-main";
        main.textContent = "+" + ROW_SOLVE_FLOAT_POINTS;
        const sub = document.createElement("span");
        sub.className = "row-points-sub";
        sub.textContent = "points added";
        el.appendChild(main);
        el.appendChild(sub);
        rowWrap.appendChild(el);
        el.addEventListener(
          "animationend",
          function () {
            el.remove();
          },
          { once: true }
        );
      }

      function checkRow(rowEl, word) {
        const slots = rowEl.querySelectorAll(".slot.slot-active");
        let filled = "";
        slots.forEach((s) => {
          filled += s.textContent.trim() || "";
        });
        if (filled.length !== word.length) return false;
        if (filled !== word) return false;
        if (!rowEl.classList.contains("solved")) {
          rowEl.classList.add("solved");
          syncRowInnerWidth(rowEl);
          spawnRowPointsFloat(rowEl);
        }
        return true;
      }

      /** True if no hint letters were placed this round (counter + any hint-marked slot). */
      function isNoHintRoundState() {
        if (cluesUsed !== 0) return false;
        if (!board || !board.querySelector) return true;
        return board.querySelector(".slot.slot-from-hint") === null;
      }

      function tryFinishRound(words, theme) {
        if (roundComplete || !allRowsSolved()) return;
        roundComplete = true;
        syncHudHintButton();
        const elapsedRaw =
          roundStartMs > 0 ? (performance.now() - roundStartMs) / 1000 : Number.POSITIVE_INFINITY;
        elapsedAtFinishSec = roundStartMs > 0 ? elapsedRaw : 0;
        const isFastLevel = endlessDeck.length > 0 && elapsedRaw <= LEVEL_SPEED_MAX_SECONDS;
        const isCleanLevel = endlessDeck.length > 0 && isNoHintRoundState();
        burstRoundWinCelebration(isFastLevel, isCleanLevel, 1);
        const hintPen = totalHintPenalty();
        const roundScore = computeScore(words, moves, hintPen);
        const willCompleteSet = endlessDeck.length > 0 && (roundIndex + 1) % 5 === 0;
        let setBonusLines = "";

        lastRoundPrevLifetime = lifetimeScore;
        lifetimeScore += roundScore;

        let roundBonusLines = "";
        let celebratedPureBadgeThisRound = false;

        if (isFastLevel && isCleanLevel) {
          const comboTotal =
            LEVEL_SPEED_BONUS + LEVEL_CLEAN_BONUS + LEVEL_SPEED_CLEAN_COMBO_BONUS;
          lifetimeScore += comboTotal;
          blitzSetsLifetime++;
          setTimeout(function () {
            burstRoundWinCelebration(isFastLevel, isCleanLevel, 0.52);
          }, 140);
          spawnRoundAchievementToast(
            "Fast & clean +" + comboTotal,
            "round-earn-toast--combo"
          );
          setTimeout(function () {
            animateBadgeEarned(badgeBlitzEl);
          }, 380);
          setTimeout(function () {
            animateBadgeEarned(badgePureEl);
          }, 680);
          celebratedPureBadgeThisRound = true;
          roundBonusLines +=
            "<br /><strong>Fast &amp; clean</strong> — under 1:00, no hints (&plus;" +
            LEVEL_SPEED_BONUS +
            " + " +
            LEVEL_CLEAN_BONUS +
            " + " +
            LEVEL_SPEED_CLEAN_COMBO_BONUS +
            " combo)";
          updateAchievementBadges();
        } else if (isFastLevel) {
          lifetimeScore += LEVEL_SPEED_BONUS;
          blitzSetsLifetime++;
          setTimeout(function () {
            burstRoundWinCelebration(isFastLevel, isCleanLevel, 0.52);
          }, 120);
          spawnRoundAchievementToast("Fast +" + LEVEL_SPEED_BONUS, "round-earn-toast--fast");
          setTimeout(function () {
            animateBadgeEarned(badgeBlitzEl);
          }, 400);
          roundBonusLines +=
            "<br /><strong>Fast level</strong> — under 1:00 (&plus;" + LEVEL_SPEED_BONUS + " pts)";
          updateAchievementBadges();
        } else if (isCleanLevel) {
          lifetimeScore += LEVEL_CLEAN_BONUS;
          setTimeout(function () {
            burstRoundWinCelebration(isFastLevel, isCleanLevel, 0.52);
          }, 120);
          spawnRoundAchievementToast("Clean +" + LEVEL_CLEAN_BONUS, "round-earn-toast--clean");
          setTimeout(function () {
            animateBadgeEarned(badgePureEl);
          }, 400);
          celebratedPureBadgeThisRound = true;
          roundBonusLines +=
            "<br /><strong>Clean level</strong> — no hints (&plus;" + LEVEL_CLEAN_BONUS + " pts)";
        }

        const roundFlairHtml = buildWinModalBadgeHeroHtml(isFastLevel, isCleanLevel);

        if (willCompleteSet) {
          const isPure = hintsThisSet === 0;
          if (isPure) {
            lifetimeScore += SET_PURE_BONUS;
            pureSetsLifetime++;
            if (!celebratedPureBadgeThisRound) {
              animateBadgeEarned(badgePureEl);
            }
            setBonusLines +=
              "<br /><strong>Pure set!</strong> No hints this full set (&plus;" + SET_PURE_BONUS + " pts)";
          }
          bumpSessionSetsCleared();
          animateBadgeEarned(badgeStreakEl);
        }

        clampLifetimeScore();
        const scoreGainedThisRound = lifetimeScore - lastRoundPrevLifetime;
        pendingSetCelebration = willCompleteSet;
        saveEndlessState();
        const par = minMovesPar(words);
        scoreDisplayEl.textContent = "\u2014";
        finalScoreEl.textContent = "0";
        themeRevealEl.hidden = false;
        themeRevealEl.innerHTML =
          "These were synonyms of<br /><strong>" +
          escapeHtml(theme) +
          "</strong><span class=\"level-line\">Level " +
          escapeHtml(String(roundCtx.level || 1)) +
          "</span>";
        const hintLine =
          isCleanLevel
            ? "No hints used."
            : "<strong>" +
              cluesUsed +
              "</strong> hint" +
              (cluesUsed === 1 ? "" : "s") +
              " (&minus;<strong>" +
              hintPen +
              "</strong> pts).";
        if (winCelebrationRowEl) {
          winCelebrationRowEl.innerHTML = roundFlairHtml;
        }
        winMessageEl.innerHTML =
          "<strong>" +
          moves +
          "</strong> moves &middot; par <strong>" +
          par +
          "</strong><br />Time: <strong>" +
          formatClock(elapsedAtFinishSec) +
          "</strong> (not scored)<br />" +
          hintLine +
          roundBonusLines +
          setBonusLines;
        const runLen = endlessDeck.length;
        const isLastRound = runLen > 0 && roundIndex >= runLen - 1;
        nextRoundBtn.textContent = isLastRound ? "Done" : "Next round";
        const winModalEl = winOverlay.querySelector(".modal");
        if (isFastLevel || isCleanLevel) {
          winOverlay.classList.add("win-overlay--juice");
          if (winModalEl) winModalEl.classList.add("modal--juice-burst");
        } else {
          winOverlay.classList.remove("win-overlay--juice");
          if (winModalEl) winModalEl.classList.remove("modal--juice-burst");
        }
        updateAchievementBadges();
        winOverlay.classList.add("open");
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            animateScoreOnSplash(finalScoreEl, scoreGainedThisRound, 1650, function () {
              scoreDisplayEl.textContent = String(lifetimeScore);
              winOverlay.querySelector(".btn").focus();
            });
          });
        });
      }

      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function returnLetterFromSlot(rowWrap, slotEl) {
        if (!slotEl.classList.contains("filled")) return;
        const ch = slotEl.textContent;
        appendReturnedLetterToTray(rowWrap, ch);
        emptySlot(slotEl, rowWrap);
        bumpMoves();
        clearSelection();
        syncHudHintButton();
        syncRowInnerWidth(rowWrap);
        syncWrongGuessState(rowWrap);
      }

      /**
       * Replace the letter in a filled slot with a tray letter (one move). Pick a letter, then tap the slot to swap.
       */
      function swapTrayLetterIntoFilledSlot(rowWrap, letterBtn, slotEl) {
        const word = rowWrap.dataset.word || "";
        if (roundComplete || rowWrap.classList.contains("solved")) return;
        if (rowWrap.classList.contains("row-wrong")) return;
        if (!slotEl.classList.contains("filled")) return;
        if (letterBtn.classList.contains("used")) return;
        if (String(letterBtn.dataset.row) !== String(rowWrap.dataset.row)) return;

        const oldCh = slotEl.textContent.trim();
        const newCh = letterBtn.textContent.trim();
        if (oldCh === newCh) {
          letterBtn.classList.remove("selected");
          selectedLetterId = null;
          return;
        }

        appendReturnedLetterToTray(rowWrap, oldCh);
        emptySlot(slotEl, rowWrap);

        letterBtn.classList.add("used");
        letterBtn.classList.remove("selected");
        selectedLetterId = null;
        slotEl.textContent = letterBtn.textContent;
        slotEl.classList.add("filled");
        slotEl.classList.remove("empty");
        slotEl.setAttribute(
          "aria-label",
          "Slot " + (Number(slotEl.dataset.index) + 1) + ": " + letterBtn.textContent
        );

        bumpMoves();
        clearSelection();
        checkRow(rowWrap, word);
        syncWrongGuessState(rowWrap);
        syncHudHintButton();
        tryFinishRound(roundCtx.words, roundCtx.theme);
        syncRowInnerWidth(rowWrap);
      }

      /**
       * @param {HTMLElement|null} specificSlot empty slot from a tap, or null for first empty (typing).
       */
      function placeLetterFromTray(rowWrap, letterBtn, specificSlot) {
        const word = rowWrap.dataset.word || "";
        if (rowWrap.classList.contains("row-wrong")) return;
        const slotEl =
          specificSlot &&
          specificSlot.classList.contains("slot-active") &&
          specificSlot.classList.contains("empty")
            ? specificSlot
            : rowWrap.querySelector(".slot.slot-active.empty");
        if (!slotEl || letterBtn.classList.contains("used")) return;
        letterBtn.classList.add("used");
        letterBtn.classList.remove("selected");
        selectedLetterId = null;
        slotEl.textContent = letterBtn.textContent;
        slotEl.classList.add("filled");
        slotEl.classList.remove("empty");
        slotEl.setAttribute(
          "aria-label",
          "Slot " + (Number(slotEl.dataset.index) + 1) + ": " + letterBtn.textContent
        );
        bumpMoves();
        checkRow(rowWrap, word);
        syncWrongGuessState(rowWrap);
        syncHudHintButton();
        tryFinishRound(roundCtx.words, roundCtx.theme);
      }

      function recallLastFilled(rowWrap) {
        const slots = rowWrap.querySelectorAll(".slot.slot-active");
        for (let i = slots.length - 1; i >= 0; i--) {
          if (slots[i].classList.contains("filled")) {
            returnLetterFromSlot(rowWrap, slots[i]);
            return;
          }
        }
      }

      function canApplyHint(rowWrap) {
        if (roundComplete || rowWrap.classList.contains("solved")) return false;
        const word = rowWrap.dataset.word || "";
        const slots = rowWrap.querySelectorAll(".slot.slot-active");
        const tray = rowWrap.querySelector(".letter-tray");
        if (!tray) return false;
        for (let i = 0; i < slots.length; i++) {
          if (!slots[i].classList.contains("empty")) continue;
          const need = word[i];
          const letters = tray.querySelectorAll(".letter:not(.used)");
          for (let j = 0; j < letters.length; j++) {
            if (letters[j].textContent === need) return true;
          }
          return false;
        }
        return false;
      }

      function getHintTargetRow() {
        if (
          hintTargetRow &&
          board.contains(hintTargetRow) &&
          !hintTargetRow.classList.contains("solved")
        ) {
          return hintTargetRow;
        }
        const byFocus = board.querySelector(".row-wrap:focus-within");
        if (byFocus && !byFocus.classList.contains("solved")) return byFocus;
        return null;
      }

      function syncHudHintButton() {
        if (!hudHintBtn) return;
        const wrap = getHintTargetRow();
        const ok = !!wrap && canApplyHint(wrap);
        hudHintBtn.disabled = roundComplete || (!!wrap && !ok);
        if (roundComplete) {
          hudHintBtn.removeAttribute("title");
        } else if (!wrap) {
          hudHintBtn.setAttribute("title", "Tap a word row first, then press Hint");
        } else if (!ok) {
          hudHintBtn.setAttribute("title", "No hint available for this row");
        } else {
          hudHintBtn.setAttribute("title", "Reveal next letter in this row (reduces score)");
        }
      }

      function applyHint(rowWrap) {
        if (roundComplete || rowWrap.classList.contains("solved")) return;
        const word = rowWrap.dataset.word || "";
        const slots = rowWrap.querySelectorAll(".slot.slot-active");
        const tray = rowWrap.querySelector(".letter-tray");
        if (!tray) return;
        let targetSlot = null;
        let idx = -1;
        for (let i = 0; i < slots.length; i++) {
          if (slots[i].classList.contains("empty")) {
            targetSlot = slots[i];
            idx = i;
            break;
          }
        }
        if (!targetSlot || idx < 0) return;
        const need = word[idx];
        const letters = tray.querySelectorAll(".letter:not(.used)");
        let btn = null;
        for (let j = 0; j < letters.length; j++) {
          if (letters[j].textContent === need) {
            btn = letters[j];
            break;
          }
        }
        if (!btn) return;
        cluesUsed++;
        hintsThisSet++;
        saveEndlessState();
        updateHintPillCount();
        btn.classList.add("used");
        btn.classList.remove("selected");
        selectedLetterId = null;
        clearSelection();
        targetSlot.textContent = need;
        targetSlot.classList.add("filled", "slot-from-hint");
        targetSlot.classList.remove("empty");
        targetSlot.dataset.fromHint = "1";
        targetSlot.setAttribute("aria-label", "Slot " + (idx + 1) + ": " + need + " (hint)");
        checkRow(rowWrap, word);
        syncWrongGuessState(rowWrap);
        syncHudHintButton();
        tryFinishRound(roundCtx.words, roundCtx.theme);
      }

      if (hudHintBtn) {
        hudHintBtn.addEventListener("mousedown", function () {
          /* Keep hint row sticky — sync runs before click so disable state stays correct. */
          syncHudHintButton();
        });
        hudHintBtn.addEventListener("click", function () {
          if (roundComplete) return;
          const w = getHintTargetRow();
          if (!w) {
            showHintHudMessage("Tap a word first");
            return;
          }
          if (!canApplyHint(w)) return;
          applyHint(w);
        });
      }

      if (badgeBlitzEl) {
        badgeBlitzEl.addEventListener("click", function () {
          openBadgeInfo("blitz");
        });
      }
      if (badgePureEl) {
        badgePureEl.addEventListener("click", function () {
          openBadgeInfo("pure");
        });
      }
      if (badgeStreakEl) {
        badgeStreakEl.addEventListener("click", function () {
          openBadgeInfo("streak");
        });
      }
      if (badgeInfoOverlay) {
        badgeInfoOverlay.addEventListener("click", function (e) {
          if (e.target === badgeInfoOverlay) closeBadgeInfo();
        });
      }
      if (badgeInfoClose) {
        badgeInfoClose.addEventListener("click", closeBadgeInfo);
      }
      if (badgeInfoDismiss) {
        badgeInfoDismiss.addEventListener("click", closeBadgeInfo);
      }
      board.addEventListener(
        "focusin",
        function () {
          syncHudHintButton();
        },
        true
      );
      board.addEventListener(
        "focusout",
        function () {
          requestAnimationFrame(syncHudHintButton);
        },
        true
      );

      document.addEventListener(
        "keydown",
        function (e) {
          if (badgeInfoOverlay && badgeInfoOverlay.classList.contains("open")) {
            if (e.key === "Escape") {
              e.preventDefault();
              closeBadgeInfo();
            }
            return;
          }
          if (roundComplete) return;
          if (winOverlay.classList.contains("open")) return;
          if (setCompleteOverlay.classList.contains("open")) return;
          const wrap = board.querySelector(".row-wrap:focus-within");
          if (!wrap) return;
          if (e.ctrlKey || e.metaKey || e.altKey) return;

          if (wrap.classList.contains("row-wrong")) {
            e.preventDefault();
            resetWrongGuessRow(wrap);
            return;
          }

          if (e.key === "Backspace") {
            e.preventDefault();
            recallLastFilled(wrap);
            return;
          }

          if (e.key.length !== 1) return;
          const key = e.key.toUpperCase();
          if (key < "A" || key > "Z") return;
          e.preventDefault();
          const active = document.activeElement;
          if (
            active &&
            active.classList.contains("slot") &&
            active.classList.contains("slot-active") &&
            active.classList.contains("filled") &&
            wrap.contains(active)
          ) {
            const lettersSwap = wrap.querySelectorAll(".letter:not(.used)");
            for (let k = 0; k < lettersSwap.length; k++) {
              if (lettersSwap[k].textContent === key) {
                swapTrayLetterIntoFilledSlot(wrap, lettersSwap[k], /** @type {HTMLElement} */ (active));
                return;
              }
            }
            return;
          }
          const letters = wrap.querySelectorAll(".letter:not(.used)");
          for (let k = 0; k < letters.length; k++) {
            if (letters[k].textContent === key) {
              placeLetterFromTray(wrap, letters[k], null);
              return;
            }
          }
        },
        true
      );

      function showCollectionComplete() {
        roundComplete = true;
        hintTargetRow = null;
        syncHudHintButton();
        board.innerHTML =
          "<div class=\"daily-complete\"><h3>Collection complete</h3><p>You solved all <strong>" +
          endlessDeck.length +
          "</strong> puzzles.</p><p style=\"margin-top:0.65rem\">Total score: <strong>" +
          lifetimeScore +
          "</strong></p><button type=\"button\" class=\"replay-btn\" id=\"replayShuffleBtn\">New shuffle</button></div>";
        board.onclick = null;
        levelIndicatorEl.textContent = "Complete";
        dailyProgressEl.textContent =
          "Set " + totalSetsFromDeck(endlessDeck) + " / " + totalSetsFromDeck(endlessDeck);
        const replay = board.querySelector("#replayShuffleBtn");
        if (replay) {
          replay.addEventListener("click", function () {
            startNewShuffleKeepScore();
          });
        }
        updateAchievementBadges();
        saveEndlessState();
      }

      function buildRound() {
        ensureEndlessDeck();

        roundComplete = false;
        moves = 0;
        cluesUsed = 0;
        selectedLetterId = null;
        elapsedAtFinishSec = 0;
        moveCountEl.textContent = "0";
        scoreDisplayEl.textContent = endlessDeck.length ? String(lifetimeScore) : "\u2014";
        themeRevealEl.hidden = true;
        themeRevealEl.textContent = "";
        nextRoundBtn.textContent = "Next round";

        if (!endlessDeck.length) {
          levelIndicatorEl.textContent = "\u2014";
          dailyProgressEl.textContent = "";
          board.innerHTML =
            "<p style=\"padding:1rem;text-align:center\">No puzzle rounds loaded.</p>";
          board.onclick = null;
          syncHudHintButton();
          updateHintPillCount();
          updateAchievementBadges();
          return;
        }

        if (roundIndex >= endlessDeck.length) {
          showCollectionComplete();
          return;
        }

        if (roundIndex % 5 === 0) {
          hintsThisSet = 0;
        }

        updateHintPillCount();
        saveEndlessState();

        const data = endlessDeck[roundIndex];
        roundCtx = {
          words: data.words,
          theme: data.theme,
          level: typeof data.level === "number" ? data.level : 1,
        };
        const levelInSet = (roundIndex % 5) + 1;
        levelIndicatorEl.textContent = "Level " + levelInSet + "/5";
        const ts = totalSetsFromDeck(endlessDeck);
        dailyProgressEl.textContent =
          "Set " + (ts ? Math.floor(roundIndex / 5) + 1 : 0) + " / " + (ts || 0);
        hintTargetRow = null;
        board.innerHTML = "";

        data.words.forEach((word, rowIdx) => {
          const letters = shuffle(word.split(""));
          const wrap = document.createElement("div");
          wrap.className = "row-wrap";
          wrap.tabIndex = 0;
          wrap.setAttribute("role", "group");
          wrap.setAttribute(
            "aria-label",
            "Word " +
              (rowIdx + 1) +
              " — tap a letter, then a slot; tap a filled slot to swap. Hint is in the score bar when this row is focused. Keyboard: type A–Z; focus a filled slot to swap."
          );
          wrap.dataset.word = word;
          wrap.dataset.row = String(rowIdx);

          wrap.addEventListener("click", function (ev) {
            if (ev.target === wrap) wrap.focus();
          });
          wrap.addEventListener("mousedown", function (ev) {
            if (roundComplete) return;
            const el = /** @type {HTMLElement} */ (ev.target);
            if (el.closest(".letter")) return;
            if (el.closest(".slot.slot-active.filled")) return;
            wrap.focus({ preventScroll: true });
          });
          wrap.addEventListener("pointerdown", function () {
            if (roundComplete || wrap.classList.contains("solved")) return;
            hintTargetRow = wrap;
          }, true);
          wrap.addEventListener("focusin", function () {
            if (roundComplete) return;
            wrap.classList.add("row-active");
            hintTargetRow = wrap;
          });
          wrap.addEventListener("focusout", function (ev) {
            const next = /** @type {FocusEvent} */ (ev).relatedTarget;
            if (
              next &&
              hudHintBtn &&
              (next === hudHintBtn || hudHintBtn.contains(/** @type {Node} */ (next)))
            ) {
              return;
            }
            if (!next || !wrap.contains(next)) {
              wrap.classList.remove("row-active");
            }
          });

          const tray = document.createElement("div");
          tray.className = "letter-tray";
          tray.setAttribute("role", "group");
          tray.setAttribute("aria-label", "Scrambled letters");

          letters.forEach((ch, i) => {
            const id = "r" + rowIdx + "-l" + i + "-" + ch + "-" + Math.random().toString(36).slice(2, 7);
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "letter";
            btn.textContent = ch;
            btn.dataset.id = id;
            btn.dataset.char = ch;
            btn.dataset.row = String(rowIdx);
            btn.setAttribute("aria-label", "Letter " + ch);
            tray.appendChild(btn);
          });

          const slotsRow = document.createElement("div");
          slotsRow.className = "slots";
          slotsRow.setAttribute("role", "group");
          slotsRow.setAttribute("aria-label", "Answer slots");

          const wordLen = word.length;
          /* One answer slot per letter — same count as the tray so rows line up (no wide 15-cell pad strip). */
          for (let wi = 0; wi < wordLen; wi++) {
            const slot = document.createElement("button");
            slot.type = "button";
            slot.className = "slot slot-active empty";
            slot.dataset.index = String(wi);
            slot.dataset.row = String(rowIdx);
            slot.setAttribute("aria-label", "Slot " + (wi + 1) + " empty");
            slotsRow.appendChild(slot);
          }

          const inner = document.createElement("div");
          inner.className = "row-inner";
          inner.appendChild(slotsRow);
          inner.appendChild(tray);
          wrap.appendChild(inner);

          board.appendChild(wrap);
        });

        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            board.querySelectorAll(".row-wrap").forEach(function (w) {
              syncRowInnerWidth(w);
            });
            syncHudHintButton();
          });
        });

        board.onclick = boardClickHandler;
        beginRoundTiming();
        updateAchievementBadges();
      }

      function boardClickHandler(e) {
        if (roundComplete) return;
        const t = /** @type {HTMLElement} */ (e.target);
        const wrongWrap = t.closest(".row-wrap.row-wrong");
        if (wrongWrap) {
          resetWrongGuessRow(wrongWrap);
          return;
        }

        const letterEl = t.closest(".letter");
        const slotEl = t.closest(".slot.slot-active");

        if (letterEl && !letterEl.classList.contains("used")) {
          const same = letterEl.classList.contains("selected");
          clearSelection();
          if (!same) {
            letterEl.classList.add("selected");
            selectedLetterId = letterEl.dataset.id || null;
          }
          return;
        }

        if (slotEl && wrapFor(slotEl)) {
          const rowWrap = wrapFor(slotEl);

          if (slotEl.classList.contains("filled")) {
            const selected = document.querySelector(
              '.letter.selected[data-row="' + rowWrap.dataset.row + '"]'
            );
            if (selected && !selected.classList.contains("used")) {
              swapTrayLetterIntoFilledSlot(rowWrap, selected, slotEl);
              return;
            }
            returnLetterFromSlot(rowWrap, slotEl);
            return;
          }

          if (slotEl.classList.contains("empty") && selectedLetterId) {
            const selected = document.querySelector(
              '.letter.selected[data-row="' + rowWrap.dataset.row + '"]'
            );
            if (!selected) {
              clearSelection();
              return;
            }
            placeLetterFromTray(rowWrap, selected, slotEl);
          }
        }
      }

      function wrapFor(el) {
        return el.closest(".row-wrap");
      }

      nextRoundBtn.addEventListener("click", function () {
        winOverlay.classList.remove("open", "win-overlay--juice");
        const winModalJuice = winOverlay.querySelector(".modal");
        if (winModalJuice) winModalJuice.classList.remove("modal--juice-burst");
        if (endlessDeck.length) {
          scoreDisplayEl.textContent = String(lifetimeScore);
        }
        if (roundIndex >= endlessDeck.length) return;
        if (pendingSetCelebration) {
          openSetCompleteCelebration();
          return;
        }
        roundIndex++;
        saveEndlessState();
        buildRound();
      });

      setShareBtn.addEventListener("click", function () {
        shareSetComplete();
      });

      setContinueBtn.addEventListener("click", function () {
        setCompleteOverlay.classList.remove("open");
        pendingSetCelebration = false;
        if (roundIndex >= endlessDeck.length) return;
        roundIndex++;
        saveEndlessState();
        buildRound();
      });

      readSessionSetsCleared();
      buildRound();
    })();
  </script>
</body>
</html>
